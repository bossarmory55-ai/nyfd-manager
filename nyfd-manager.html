function exportCSV(){
  const dates=getAllSalesDates();
  const defFC=loadFC();
  let csv='Date,Gross,Discount,Net Sales,Total Cash,Credit Sales,Total Sales,Variance,Customers,Avg Transaction,Net Profit,Fixed Costs,CoGS,Labor,Other Expenses,Expense Log,Restock Spend\n';
  dates.forEach(function(d){
    const rep=loadSales(d);
    const cv=rep?computeSales(rep):{gross:0,grandDisc:0,netSales:0,totalCash:0,creditSales:0,totalSales:0,variance:0};
    const cust=rep?parseN(rep.custCount):0;
    const atv=cust>0?(cv.netSales/cust).toFixed(2):'';
    const pl=loadPL(d);
    var netProfit='',fcTotal='',cogsTotal='',laborTotal='',otherTotal='',expLog='',rkSpend='';
    if(pl){
      if(typeof pl.netProfit==='number')netProfit=pl.netProfit.toFixed(2);
      var fc2=pl.fixedOverrides||{};
      fcTotal=Object.keys(defFC).reduce(function(s,k){return s+parseN(fc2[k]!==undefined?fc2[k]:defFC[k]);},0).toFixed(2);
      if(pl.cogsMode==='total'){cogsTotal=parseN(pl.cogsTotal||0).toFixed(2);}
      else{var cg=0;(pl.cogsItems?Object.values(pl.cogsItems):[]).forEach(function(v){cg+=parseN(v);});cg+=parseN(pl.cogsMisc||0);cogsTotal=cg.toFixed(2);}
      laborTotal=(parseN(pl.laborOverride||0)+parseN(pl.otOverride||0)+parseN(pl.holiday||0)).toFixed(2);
      otherTotal=(pl.otherExpenses||[]).reduce(function(s,e){return s+parseN(e.amt||0);},0).toFixed(2);
      expLog=parseN(pl.expLogTotal||0).toFixed(2);
      rkSpend=parseN(pl.rkLogTotal||0).toFixed(2);
    }
    csv+=d+','+cv.gross+','+cv.grandDisc+','+cv.netSales+','+cv.totalCash+','+cv.creditSales+','+cv.totalSales+','+cv.variance+','+(cust||'')+','+atv+','+netProfit+','+fcTotal+','+cogsTotal+','+laborTotal+','+otherTotal+','+expLog+','+rkSpend+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='NYFD_'+ST.branch.replace(/\s+/g,'_')+'_Full_History.csv';
  a.click();
}

function printMonthlyReport(ym){
  const allDates=getAllSalesDates();
  const monthDates=allDates.filter(d=>d.startsWith(ym)).sort();
  if(!monthDates.length){alert('No data for '+ym);return}
  let mGross=0,mDisc=0,mNet=0,mVar=0,mCust=0,mDays=0,mBestDay=null,mBestNet=0;
  let rows='';
  monthDates.forEach(d=>{
    const rep=loadSales(d);
    const cv=rep?computeSales(rep):{gross:0,grandDisc:0,netSales:0,variance:0};
    const cust=rep?parseN(rep.custCount):0;
    const atv=cust>0?cv.netSales/cust:null;
    mGross+=cv.gross;mDisc+=cv.grandDisc;mNet+=cv.netSales;mVar+=cv.variance;mDays++;
    if(cust>0)mCust+=cust;
    if(cv.netSales>mBestNet){mBestNet=cv.netSales;mBestDay=d;}
    rows+=`<tr><td>${fmtDate(d)}</td><td>${fmtPHP(cv.gross)}</td><td>${fmtPHP(cv.grandDisc)}</td>
      <td>${fmtPHP(cv.netSales)}</td><td>${cust||'—'}</td><td>${atv!==null?fmtPHP(atv):'—'}</td>
      <td>${fmtPHP(cv.variance)}</td></tr>`;
  });
  const mAtv=mCust>0?mNet/mCust:null;
  const avgDaily=mDays>0?mNet/mDays:0;
  const h=`<div class="ph">
    <h1>NEW YORK FRIES &amp; DIPS — ${ST.branch}</h1>
    <h2>MONTHLY SALES REPORT — ${ym}</h2>
    <p>Printed: ${fmtDate(today())}</p>
  </div>
  <div class="ps"><h3>Daily Breakdown</h3>
  <table class="pt"><tr><th>Date</th><th>Gross</th><th>Discount</th><th>Net</th><th>Customers</th><th>Avg Txn</th><th>Variance</th></tr>
  ${rows}
  <tr style="font-weight:bold;background:#f9f9f9"><td>TOTAL (${mDays} days)</td>
    <td>${fmtPHP(mGross)}</td><td>${fmtPHP(mDisc)}</td><td>${fmtPHP(mNet)}</td>
    <td>${mCust||'—'}</td><td>${mAtv!==null?fmtPHP(mAtv):'—'}</td><td>${fmtPHP(mVar)}</td></tr>
  </table></div>
  <div class="prow">
    <div class="pf"><label>Total Gross</label><span>${fmtPHP(mGross)}</span></div>
    <div class="pf"><label>Total Net</label><span>${fmtPHP(mNet)}</span></div>
    <div class="pf"><label>Total Variance</label><span>${fmtPHP(mVar)}</span></div>
    <div class="pf"><label>Avg Daily Net</label><span>${fmtPHP(avgDaily)}</span></div>
    ${mBestDay?`<div class="pf"><label>Best Day</label><span>${fmtDate(mBestDay)}</span></div>`:''}
  </div>`;
  const pa=document.getElementById('print-area');
  pa.innerHTML=h;
  window.print();
  setTimeout(()=>{pa.innerHTML=''},500);
}

  let h=`<div class="ph">

  DENOMS.forEach(dn=>{

  });

  // Online payments

  <tr><td>Senior Citizen (SC)</td><td>${rep.disc?.SC?.qty||''}</td><td>${rep.disc?.SC?.amt?fmtPHP(rep.disc.SC.amt):''}</td></tr>
  <tr><td>Persons w/ Disability (PWD)</td><td>${rep.disc?.PWD?.qty||''}</td><td>${rep.disc?.PWD?.amt?fmtPHP(rep.disc.PWD.amt):''}</td></tr>
  <tr style="font-weight:bold;background:#f9f9f9"><td>GRAND TOTAL DISCOUNT</td><td></td><td>${fmtPHP(c.grandDisc)}</td></tr>
  </table></div>`;

  // Computed totals
  h+=`<div class="ps"><h3>Computed Totals</h3><div class="prow">
    <div class="pf"><label>Grand Total (Gross)</label><span>${fmtPHP(c.gross)}</span></div>
    <div class="pf"><label>Grand Total Discount</label><span>${fmtPHP(c.grandDisc)}</span></div>
    <div class="pf"><label>Net Sales</label><span>${fmtPHP(c.netSales)}</span></div>
    <div class="pf"><label>Total Cash</label><span>${fmtPHP(c.totalCash)}</span></div>
    <div class="pf"><label>Credit Sales</label><span>${fmtPHP(c.creditSales)}</span></div>
    <div class="pf"><label>Total Sales</label><span>${fmtPHP(c.totalSales)}</span></div>
    <div class="pf"><label>Short / Variance</label><span>${fmtPHP(c.variance)}</span></div>

  // CF breakdown

    <div><label>CHECKED BY</label><div class="line"></div><div>${rep.checkBy||''}</div></div>

  doPrint(h);

function printInv(date){
  const inv=loadInv(date);
  if(!inv){alert('No inventory saved for '+fmtDate(date));return}

  let h=`<div class="ph">
    <h1>NEW YORK FRIES &amp; DIPS — ${ST.branch}</h1>
    <h2>INVENTORY SHEET</h2>
    <p>Date: ${fmtDate(date)}</p>
  </div>`;

  h+=`<div class="ps"><table class="pt">
    <thead><tr><th>Item</th><th>UOM</th><th>Opening</th><th>Closing</th><th>Total Used</th><th>Remaining</th></tr></thead><tbody>`;
  INV_CATS.forEach(cat=>{
    h+=`<tr><td colspan="6" style="background:#f0f0f0;font-weight:bold;font-size:8.5pt;text-transform:uppercase;letter-spacing:.5px">${cat.name}</td></tr>`;
    cat.items.forEach(item=>{
      const op=inv.items?.[item.n]?.op||'';
      const cl=inv.items?.[item.n]?.cl||'';
      const used=op!==''&&cl!==''?Math.max(0,parseN(op)-parseN(cl)):'';
      const rem=cl!==''?parseN(cl):'';
      const ls=rem!==''&&rem<=2;
      h+=`<tr ${ls?'style="background:#fff3e0"':''}>
        <td>${item.n}${ls?' ⚠️':''}</td><td>${item.u}</td>
        <td>${op}</td><td>${cl}</td><td>${used}</td>
        <td style="${ls?'font-weight:bold;color:#c0392b':''}${rem===0?';text-decoration:underline':''}">${rem}</td>
      </tr>`;
    });
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="psig">
    <div><label>OPENING STAFF (Checked By)</label><div class="line"></div><div>${inv.openStaff||''}</div></div>
    <div><label>CLOSING STAFF (Checked By)</label><div class="line"></div><div>${inv.closeStaff||''}</div></div>
  </div>`;
  if(inv.remarks)h+=`<p style="margin-top:8px"><b>Remarks:</b> ${inv.remarks}</p>`;

  doPrint(h);
}

function doPrint(html){
  const pa=document.getElementById('print-area');
  pa.innerHTML=html;
  pa.style.display='block';
  setTimeout(()=>{
    window.print();
    pa.style.display='none';
  },200);
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:.6rem 1.2rem;border-radius:30px;font-size:.85rem;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.style.opacity='0',2000);
}

function openExpDrilldown(cat,ym){
  var budgets=loadExpBudgets();
  var cap=parseN(budgets[cat]||0);
  // Gather every expense in this category for the month across all days
  var pfx='nyfd_exp_'+ST.branch.replace(/\s+/g,'_')+'_'+ym;
  var rows=[];
  Object.keys(localStorage).filter(function(k){return k.startsWith(pfx);}).sort().forEach(function(k){
    var d=k.replace('nyfd_exp_'+ST.branch.replace(/\s+/g,'_')+'_','');
    JSON.parse(localStorage.getItem(k)||'[]').forEach(function(e){
      if(e.cat===cat)rows.push(Object.assign({},e,{date:d}));
    });
  });
  var total=rows.reduce(function(s,e){return e.status!=='rejected'?s+parseN(e.amt):s;},0);
  var pct=cap>0?Math.round(total/cap*100):null;
  var pctColor=pct===null?'var(--grey)':pct>=100?'#991B1B':pct>=80?'#D97706':'#065F46';
  var html='<div style="max-height:75vh;overflow-y:auto">'
    +'<div style="font-weight:900;font-size:1rem;margin-bottom:.15rem">💰 '+esc(cat)+' — '+ym+'</div>'
    +'<div style="font-size:.78rem;color:var(--grey);margin-bottom:.75rem">'+esc(ST.branch)+'</div>'
    +(cap>0?'<div style="background:var(--grey2);border-radius:20px;height:10px;overflow:hidden;margin-bottom:.35rem">'
      +'<div style="background:'+(pct>=100?'#EF4444':pct>=80?'#F59E0B':'var(--grn)')+';width:'+Math.min(pct,100)+'%;height:100%;border-radius:20px"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;margin-bottom:.85rem">'
      +'<span style="color:'+pctColor+'">Spent: '+fmtPHP(total)+' <span style="font-size:.72rem">('+pct+'%)</span></span>'
      +'<span style="color:var(--grey)">Budget: '+fmtPHP(cap)+'</span></div>':'')
    +'<table class="ft" style="font-size:.8rem"><thead><tr><th>Date</th><th>Description</th><th class="r">Amount</th><th>By</th><th>Status</th></tr></thead><tbody>';
  if(!rows.length){
    html+='<tr><td colspan="5" style="text-align:center;color:var(--grey);padding:.75rem">No expenses in this category for '+ym+'</td></tr>';
  } else {
    rows.forEach(function(e){
      var stColor=e.status==='rejected'?'#9CA3AF':e.status==='pending'?'#D97706':'#065F46';
      var stLabel=e.status==='rejected'?'Rejected':e.status==='pending'?'Pending':'Approved';
      html+='<tr style="'+(e.status==='rejected'?'opacity:.5':'')+'"><td style="white-space:nowrap">'+fmtDate(e.date)+'</td>'
        +'<td>'+esc(e.name)+'</td>'
        +'<td class="r" style="font-weight:800">'+fmtPHP(e.amt)+'</td>'
        +'<td style="font-size:.75rem;color:var(--grey)">'+esc(e.submitted_by||'?')+'</td>'
        +'<td><span style="font-size:.72rem;font-weight:800;color:'+stColor+'">'+stLabel+'</span></td></tr>';
    });
    html+='<tr style="background:var(--yel-bg);font-weight:900"><td colspan="2">TOTAL (approved + pending)</td>'
      +'<td class="r" style="color:'+(pct>=100?'#991B1B':'#1F2937')+'">'+fmtPHP(total)+'</td><td></td><td></td></tr>';
  }
  html+='</tbody></table></div>'
    +'<div style="text-align:right;margin-top:.85rem"><button onclick="closeModal()" style="background:var(--grey2);color:#374151;border:none;border-radius:8px;padding:.5rem 1.1rem;font-size:.85rem;font-weight:700;cursor:pointer">Close</button></div>';
  document.getElementById('umodal-body').innerHTML=html;
  document.getElementById('umodal').style.display='flex';
}

function confirmMonthClose(ym){
  var payrollChk=document.getElementById('mc-payroll-chk');
  if(!payrollChk||!payrollChk.checked){showToast('⚠ Please confirm payroll has been exported');return;}
  var cl=getMonthCloseChecklist(ym);
  saveMonthClose(ym,{
    closedAt:new Date().toISOString(),
    closedBy:ST.user&&ST.user.name||'Owner',
    gross:cl.gross,net:cl.net,
    plDays:cl.plDays,salesDays:cl.salesDays,
    pendingExpAtClose:cl.pendingExp,pendingRkAtClose:cl.pendingRk,missingCOGSAtClose:cl.missingCOGS,
  });
  closeModal();
  showToast('✅ '+ym+' closed — month is now locked');
  renderPL(ym+'-01');
}

// ── CLOSE DAY ─────────────────────────────────────────────────
let _closeDayDate=null;
function openCloseDay(dateOverride){
  _closeDayDate=dateOverride||null;
  const m=document.getElementById('cd-modal');
  if(m){m.style.display='flex';renderCloseDayModal();}
}
function closeCloseDayModal(){
  _closeDayDate=null;
  const m=document.getElementById('cd-modal');
  if(m)m.style.display='none';
}
function renderCloseDayModal(){
  const t=_closeDayDate||today();
  const sales=loadSales(t);
  const invData=loadInv(t);
  const plData=loadPL(t);
  const c=sales?computeSales(sales):{gross:0,netSales:0,variance:0};
  const fc=loadFC();
  const dailyFC=Object.values(fc).reduce((s,v)=>s+v,0);
  const estNet=sales?(c.gross-dailyFC):null;
  const allDone=sales&&invData&&plData;
  const inner=document.getElementById('cd-inner');
  if(!inner)return;

  const item=(done,icon,title,sub,goFn)=>`<div class="cd-item ${done?'done':'miss'}">
    <div class="cd-check ${done?'y':'n'}">${done?'✓':'✗'}</div>
    <div class="cd-item-body">
      <div class="cd-item-title">${icon} ${title}</div>
      <div class="cd-item-sub">${done?sub:'Not submitted yet'}</div>
    </div>
    ${!done?`<button class="cd-go" onclick="${goFn}">Go →</button>`:''}
  </div>`;

  const salesSub=sales?`Gross: ${fmtPHP(c.gross)} · Variance: ${fmtPHP(c.variance)}`:'';
  const invSub=invData?'Inventory recorded':'';
  const plSub=plData&&typeof plData.netProfit==='number'?`Net Profit: ${fmtPHP(plData.netProfit)}`:'P&L saved';

  let h=`<div class="cd-header">
    <div>
      <div style="font-weight:800;font-size:1rem">🔒 End-of-Day Checklist</div>
      <div style="font-size:.78rem;opacity:.85;margin-top:2px">${fmtDate(t)}</div>
    </div>
    <button class="cd-close" onclick="closeCloseDayModal()">✕ Close</button>
  </div>
  <div class="cd-body">`;

  if(allDone){
    h+=`<div style="text-align:center;padding:.75rem 0 .5rem">
      <div style="font-size:2.2rem">🎉</div>
      <div style="font-weight:800;font-size:1.05rem;color:var(--grn);margin:.3rem 0">All reports submitted!</div>
      <div style="font-size:.82rem;color:var(--grey)">Good job team. Safe to close for today.</div>
    </div>`;
  }else{
    h+=`<div style="font-size:.8rem;color:var(--grey);margin-bottom:.75rem;font-weight:600">Complete all 3 reports before closing:</div>`;
  }

  h+=item(!!sales,'🧾','Daily Sales Report',salesSub,"closeCloseDayModal();goTab('sales')");
  h+=item(!!invData,'📦','Inventory Report',invSub,"closeCloseDayModal();goTab('inventory')");
  h+=item(!!plData,'💰','P&L Report',plSub,"closeCloseDayModal();goTab('pnl')");

  if(sales){
    const vth=loadVarThreshold();
    const varOver=Math.abs(c.variance)>vth;
    h+=`<div class="cd-summary">
      <div style="font-size:.7rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.45rem">Today's Summary</div>
      <div class="cd-sum-row"><span>Gross Sales</span><span>${fmtPHP(c.gross)}</span></div>
      <div class="cd-sum-row"><span>Est. Daily Fixed Costs</span><span style="color:var(--org)">-${fmtPHP(dailyFC)}</span></div>
      ${estNet!==null?`<div class="cd-sum-row total"><span>Est. Net Profit</span><span style="color:${estNet>=0?'var(--grn)':'var(--red)'}">${fmtPHP(estNet)}</span></div>`:''}
      <div class="cd-sum-row" style="margin-top:.35rem;padding-top:.35rem;border-top:1px solid var(--bdr)">
        <span>Cash Variance</span>
        <span style="color:${varOver?'var(--red)':c.variance===0?'var(--grn)':'var(--org)'};font-weight:700">${fmtPHP(c.variance)}</span>
      </div>
      ${sales.varianceRemark?`<div style="font-size:.75rem;color:var(--grey);margin-top:.3rem;font-style:italic">Variance note: "${esc(sales.varianceRemark)}"</div>`:''}
      ${sales.remarks?`<div style="font-size:.75rem;color:var(--grey);margin-top:.25rem">Daily notes: "${esc(sales.remarks)}"</div>`:''}
      ${(function(){var el=loadExp(t);var tot=el.reduce(function(s,e){return s+parseN(e.amt);},0);return el.length?'<div style="font-size:.75rem;color:var(--org);margin-top:.25rem">Expenses logged: '+fmtPHP(tot)+' ('+el.length+' item'+(el.length>1?'s':'')+')</div>':''})()}
    </div>`;
  }

  const missingList=[];
  if(!sales)missingList.push('Sales');
  if(!invData)missingList.push('Inventory');
  if(!plData)missingList.push('P&L');

  if(allDone){
    h+=`<button class="btn btn-red" style="width:100%;margin-top:.25rem" onclick="confirmLogout()">✅ Close Day &amp; Log Out</button>`;
  }else{
    h+=`<div style="background:#FEF3C7;border-radius:8px;padding:.6rem .8rem;font-size:.8rem;font-weight:600;color:#92400E;margin-top:.15rem">
      ⚠️ Missing: ${missingList.join(', ')} — please complete before closing.
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.6rem">
      <button class="btn btn-grey" style="flex:1" onclick="closeCloseDayModal()">Close &amp; Continue Working</button>
      <button class="btn" style="flex:1;background:#FEE2E2;color:#991B1B;border:1.5px solid #FCA5A5" onclick="confirmLogout()">Log Out Anyway</button>
    </div>`;
  }

  h+=`</div>`;
  inner.innerHTML=h;
}

  doLogout();

// ── LIST REORDERING ───────────────────────────────────────────
// Swap element i with its neighbour in direction dir (-1 = up/earlier, +1 = down/later).
function arrMove(arr,i,dir){var j=i+dir;if(j<0||j>=arr.length)return false;var t=arr[i];arr[i]=arr[j];arr[j]=t;return true;}
// Up/Down buttons for vertical (table) lists. upCall/downCall are full JS calls.
function mvUD(upCall,downCall,isFirst,isLast){
  return '<button class="btn btn-grey btn-sm" style="padding:.18rem .42rem;margin-right:.15rem'+(isFirst?';opacity:.35;pointer-events:none':'')+'" '+(isFirst?'':'onclick="'+upCall+'"')+' title="Move up">&#9650;</button>'
    +'<button class="btn btn-grey btn-sm" style="padding:.18rem .42rem;margin-right:.3rem'+(isLast?';opacity:.35;pointer-events:none':'')+'" '+(isLast?'':'onclick="'+downCall+'"')+' title="Move down">&#9660;</button>';
}
// Left/Right buttons for horizontal (chip) lists.
function mvLR(prevCall,nextCall,isFirst,isLast){
  return '<button style="background:none;border:none;cursor:'+(isFirst?'default':'pointer')+';color:'+(isFirst?'#ccc':'#6B7280')+';font-size:.72rem;padding:0 .1rem;line-height:1;font-weight:900" '+(isFirst?'':'onclick="'+prevCall+'"')+' title="Move earlier">&#9664;</button>'
    +'<button style="background:none;border:none;cursor:'+(isLast?'default':'pointer')+';color:'+(isLast?'#ccc':'#6B7280')+';font-size:.72rem;padding:0 .1rem;line-height:1;font-weight:900" '+(isLast?'':'onclick="'+nextCall+'"')+' title="Move later">&#9654;</button>';
}
function ciMoveOrder(i,dir){
  // Capture any prices typed but not yet saved so reordering never loses them (prices are name-keyed).
  var p=loadItemPrices();
  ORDER_ITEMS.forEach(function(it,idx){var inp=document.getElementById('ci-price-'+idx);if(inp){var v=parseN(inp.value);if(v>0)p[it]=v;else delete p[it];}});
  saveItemPrices(p);
  if(arrMove(ORDER_ITEMS,i,dir)){saveOrderItems();renderCILists();}
}
function ciMovePlat(i,dir){if(arrMove(PLATFORMS,i,dir)){savePlatforms();renderCILists();}}
function ciMoveCat(ci,dir){if(arrMove(INV_CATS,ci,dir)){saveInvCats();renderCILists();}}
function ciMoveInvItem(ci,ii,dir){if(INV_CATS[ci]&&arrMove(INV_CATS[ci].items,ii,dir)){saveInvCats();renderCILists();}}
function moveEmp(i,dir){var e=loadEmps();if(arrMove(e,i,dir)){saveEmps(e);renderSettings();}}
function moveWH(i,dir){var w=loadWH();if(arrMove(w,i,dir)){saveWH(w);renderSettings();}}
function moveBranch(i,dir){var b=loadBranches();if(arrMove(b,i,dir)){saveBranches(b);populateBranchSelects();renderBranchTable();}}
function moveUser(i,dir){var u=loadUsers();if(arrMove(u,i,dir)){saveUsers(u);renderSettings();}}

function closeModal(){document.getElementById('umodal').style.display='none'}

function saveUserModal(userId){
  const name=document.getElementById('um-name').value.trim();
  const username=document.getElementById('um-user').value.trim();
  const pass=document.getElementById('um-pass').value;
  if(!name){alert('Full name is required.');return}
  if(!username){alert('Username is required.');return}
  const users=loadUsers();
  const dup=users.find(x=>x.username===username&&x.id!==userId);
  if(dup){alert('That username is already taken.');return}

  if(userId){
    const idx=users.findIndex(x=>x.id===userId);
    if(idx<0)return;
    users[idx].name=name;
    if(users[idx].role!=='owner')users[idx].username=username;
    if(pass)users[idx].password=pass;
    if(users[idx].role!=='owner'){
      users[idx].perms={
        dashboard:!!document.getElementById('um-dashboard')?.checked,
        dashRevenue:!!document.getElementById('um-dashRevenue')?.checked,
        dashStock:!!document.getElementById('um-dashStock')?.checked,
        dashEmployee:!!document.getElementById('um-dashEmployee')?.checked,
        sales:!!document.getElementById('um-sales')?.checked,
        inventory:!!document.getElementById('um-inventory')?.checked,
        history:!!document.getElementById('um-history')?.checked,
        pnl:!!document.getElementById('um-pnl')?.checked,
        storage:!!document.getElementById('um-storage')?.checked,
        schedule:!!document.getElementById('um-schedule')?.checked,
        canEdit:!!document.getElementById('um-canEdit')?.checked,
        hiddenFields:HIDDEN_FIELDS.map(f=>f.key).filter(k=>document.getElementById('um-hide-'+k)?.checked),
      };
    }
    // Refresh current session if editing self
    if(ST.user.id===userId){ST.user=users[idx];applyPerms()}
  } else {
    if(!pass){alert('Password is required for new accounts.');return}
    users.push({
      id:genId(),username,password:pass,name,role:'staff',
      perms:{
        dashboard:!!document.getElementById('um-dashboard')?.checked,
        dashRevenue:!!document.getElementById('um-dashRevenue')?.checked,
        dashStock:!!document.getElementById('um-dashStock')?.checked,
        dashEmployee:!!document.getElementById('um-dashEmployee')?.checked,
        sales:!!document.getElementById('um-sales')?.checked,
        inventory:!!document.getElementById('um-inventory')?.checked,
        history:!!document.getElementById('um-history')?.checked,
        pnl:!!document.getElementById('um-pnl')?.checked,
        storage:!!document.getElementById('um-storage')?.checked,
        schedule:!!document.getElementById('um-schedule')?.checked,
        canEdit:!!document.getElementById('um-canEdit')?.checked,
        hiddenFields:HIDDEN_FIELDS.map(f=>f.key).filter(k=>document.getElementById('um-hide-'+k)?.checked),
      }
    });
  }
  saveUsers(users);
  closeModal();
  renderSettings();
  showToast('Account saved ✓');
}

function confirmDelete(userId,name){
  if(!confirm(`Delete account "${name}"? This cannot be undone.`))return;
  const users=loadUsers().filter(x=>x.id!==userId);
  saveUsers(users);
  renderSettings();
  showToast('Account deleted.');
}

// ── STORAGE INVENTORY FUNCTIONS ───────────────────────────────
const DAY_ABBR=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MO_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
function curWH(){return ST.warehouse||(ST.warehouse=loadWH()[0]||'Warehouse 1')}
function storKey(date){return `nyfd_stor_${curWH().replace(/\s+/g,'_')}_${date}`}
function loadStorDay(date){const r=localStorage.getItem(storKey(date));return r?JSON.parse(r):{checker:'',items:{}}}
function saveStorDay(date,data){lsSet(storKey(date),JSON.stringify(data))}
function getWeekStart(ds){
  const d=new Date(ds+'T00:00:00');const dy=d.getDay();
  d.setDate(d.getDate()+(dy===0?-6:1-dy));return d.toISOString().split('T')[0];
}
function getWeekDates(ws){
  const r=[];const b=new Date(ws+'T00:00:00');
  for(let i=0;i<7;i++){const d=new Date(b);d.setDate(b.getDate()+i);r.push(d.toISOString().split('T')[0]);}
  return r;
}
function fmtWeekLabel(ws){
  const dates=getWeekDates(ws);
  const d0=new Date(dates[0]+'T00:00:00'),d6=new Date(dates[6]+'T00:00:00');
  return `${MO_ABBR[d0.getMonth()]} ${d0.getDate()} – ${d0.getMonth()!==d6.getMonth()?MO_ABBR[d6.getMonth()]+' ':''}${d6.getDate()}, ${d6.getFullYear()}`;
}
function dayIdx(d){const g=new Date(d+'T00:00:00').getDay();return g===0?6:g-1;}

function changeWarehouse(wh){ST.warehouse=wh;renderStorage(ST.storWeek);}

  const panel=document.getElementById('tp-storage');

  const days=dates.map(d=>loadStorDay(d));
  const prevD=new Date(weekStart+'T00:00:00');prevD.setDate(prevD.getDate()-7);
  const nextD=new Date(weekStart+'T00:00:00');nextD.setDate(nextD.getDate()+7);
  const prevS=prevD.toISOString().split('T')[0];
  const nextS=nextD.toISOString().split('T')[0];

    <div class="week-nav">
      <button class="btn btn-grey btn-sm" onclick="renderStorage('${prevS}')">◀ Prev Week</button>
      <span class="week-label">Week of ${fmtWeekLabel(weekStart)}</span>
      <button class="btn btn-grey btn-sm" onclick="renderStorage('${nextS}')">Next Week ▶</button>
    </div>
    <div style="display:flex;align-items:center;gap:.45rem;margin-left:auto;flex-shrink:0">
      <label style="font-size:.75rem;font-weight:800;color:var(--grey);white-space:nowrap">🏭 Warehouse:</label>
      <select class="wi" style="max-width:200px;font-size:.85rem;padding:.35rem .6rem" onchange="changeWarehouse(this.value)">
        ${warehouses.map(w=>`<option value="${esc(w)}"${wh===w?' selected':''}>${esc(w)}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="card"><div class="ctitle">🗄 Storage Inventory — ${esc(wh)}</div>
  <div class="stor-wrap"><table class="stor-table">
    <thead>
      <tr>
        <th colspan="2" style="text-align:left">Item / UOM</th>`;
  dates.forEach((d,i)=>{
    const dt=new Date(d+'T00:00:00');
    h+=`<th class="day-col">${DAY_ABBR[dayIdx(d)]}<br><span style="font-weight:500;font-size:.68rem;opacity:.85">${MO_ABBR[dt.getMonth()]} ${dt.getDate()}</span></th>`;
  });
  h+=`</tr>
      <tr>
        <td colspan="2" style="font-size:.72rem;font-weight:800;color:var(--grey);background:var(--grey2);padding:.35rem .55rem">CHECKER</td>`;
  dates.forEach((d,i)=>{
    h+=`<td style="background:var(--grey2)"><input class="stor-checker" id="sc-chk-${i}" type="text" value="${esc(days[i].checker||'')}" placeholder="Name" ${ro?'disabled':''}></td>`;
  });
  h+=`</tr>
    </thead><tbody>`;
  STOR_CATS.forEach(cat=>{
    h+=`<tr class="stor-cat"><td colspan="9">${cat.name}</td></tr>`;
    cat.items.forEach(item=>{
      h+=`<tr><td class="stor-name">${item.n}</td><td class="stor-uom">${item.u}</td>`;
      dates.forEach((d,i)=>{
        const val=days[i].items?.[item.n]??'';
        const numV=val===''?null:parseN(val);
        const cls=numV===null?'':numV===0?' zero':numV<=2?' low':'';
        h+=`<td><input class="stor-input${cls}" type="number" min="0" id="si-${i}-${slug(item.n)}" value="${val}" ${ro?'readonly':''}></td>`;
      });
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div></div>`;
  if(!ro)h+=`<div class="btn-grp"><button class="btn btn-red" onclick="saveStorageForm('${weekStart}')">💾 Save Week</button></div>`;
  panel.innerHTML=h;
}

function saveStorageForm(weekStart){
  if(isRO())return;
  const dates=getWeekDates(weekStart);
  dates.forEach((d,i)=>{
    const checker=document.getElementById(`sc-chk-${i}`)?.value||'';
    const items={};
    ALL_STOR_ITEMS.forEach(n=>{
      const v=document.getElementById(`si-${i}-${slug(n)}`)?.value;
      if(v!==undefined&&v!=='')items[n]=v;
    });
    saveStorDay(d,{checker,items});
  });
  showToast('Storage inventory saved ✓');
  renderStorage(weekStart);
}

function getStorLowItems(){
  const warehouses=loadWH();
  const result=[];
  warehouses.forEach(wh=>{
    const pfx=`nyfd_stor_${wh.replace(/\s+/g,'_')}_`;
    const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx));
    if(!keys.length)return;
    const latest=JSON.parse(localStorage.getItem([...keys].sort().reverse()[0]));
    ALL_STOR_ITEMS.forEach(n=>{
      const q=latest.items?.[n];
      if(q!==undefined&&q!==''&&parseN(q)<=2)result.push({name:n,qty:parseN(q),warehouse:wh});
    });
  });
  return result;
}

function schedKey(ym){return `nyfd_sched_${ST.branch.replace(/\s+/g,'_')}_${ym}`}
function loadSchedule(ym){const r=localStorage.getItem(schedKey(ym));return r?JSON.parse(r):{}}
function saveSchedule(ym,data){lsSet(schedKey(ym),JSON.stringify(data))}
function otKey(){return `nyfd_ot_${ST.branch.replace(/\s+/g,'_')}`}
function loadOT(){const r=localStorage.getItem(otKey());return r?JSON.parse(r):[]}
function saveOT(arr){lsSet(otKey(),JSON.stringify(arr))}
// Attendance: {emp: {date: 'P'|'L'|'A'}}
function attKey(ym){return`nyfd_att_${ST.branch.replace(/\s+/g,'_')}_${ym}`}
function loadAtt(ym){const r=localStorage.getItem(attKey(ym));return r?JSON.parse(r):{}}
function saveAtt(ym,data){lsSet(attKey(ym),JSON.stringify(data))}
function markAtt(ym,emp,date,status){
  const data=loadAtt(ym);
  if(!data[emp])data[emp]={};
  if(data[emp][date]===status){delete data[emp][date];}// toggle off
  else{data[emp][date]=status;}
  saveAtt(ym,data);
  // Update button visuals without full re-render
  ['P','L','A'].forEach(function(s){
    var btn=document.getElementById('att-'+slug(emp)+'-'+date+'-'+s);
    if(!btn)return;
    var active=data[emp]&&data[emp][date]===s;
    btn.style.background=active?(s==='P'?'#16a34a':s==='L'?'#D97706':'#DC2626'):'var(--grey2)';
    btn.style.color=active?'#fff':'var(--grey)';
    btn.style.fontWeight=active?'900':'600';
  });
}

function getMonthDates(ym){
  const [y,m]=ym.split('-').map(Number);
  const r=[];const days=new Date(y,m,0).getDate();
  for(let d=1;d<=days;d++)r.push(`${ym}-${String(d).padStart(2,'0')}`);
  return r;
}
function getWeeksInMonth(ym){
  const weeks=[];
  getMonthDates(ym).forEach(d=>{
    const ws=getWeekStart(d);
    let wk=weeks.find(w=>w.weekStart===ws);
    if(!wk){wk={weekStart:ws,days:[]};weeks.push(wk);}
    wk.days.push(d);
  });
  return weeks;
}

    });
    h+=`</tr></thead><tbody>`;
    emps.forEach((emp)=>{
      h+=`<tr><td class="emp-name">${esc(emp)}</td>`;
      wk.days.forEach(d=>{
        const shift=sched[emp]?.[d]||'';
        const isOffDay=shift==='OFF'||shift==='VL'||!shift;
        const isFuture=d>today();
        if(isOffDay){
          h+=`<td style="text-align:center;color:#ddd;font-size:.75rem">${shift||'—'}</td>`;
        } else if(isFuture){
          h+=`<td style="text-align:center;color:#ddd;font-size:.75rem">—</td>`;
        } else {
          const cur=att[emp]&&att[emp][d];
          const btnStyle=(s,activeColor)=>{
            const active=cur===s;
            return`style="border:none;border-radius:5px;padding:.2rem .3rem;font-size:.7rem;font-weight:${active?'900':'600'};cursor:pointer;background:${active?activeColor:'var(--grey2)'};color:${active?'#fff':'var(--grey)'};min-width:22px"`;
          };
          const eSlug=slug(emp);
          h+=`<td style="text-align:center"><div style="display:flex;gap:2px;justify-content:center">
            <button id="att-${eSlug}-${d}-P" ${btnStyle('P','#16a34a')} onclick="markAtt('${ym}','${emp.replace(/'/g,"\\'")}','${d}','P')">P</button>
            <button id="att-${eSlug}-${d}-L" ${btnStyle('L','#D97706')} onclick="markAtt('${ym}','${emp.replace(/'/g,"\\'")}','${d}','L')">L</button>
            <button id="att-${eSlug}-${d}-A" ${btnStyle('A','#DC2626')} onclick="markAtt('${ym}','${emp.replace(/'/g,"\\'")}','${d}','A')">A</button>
          </div></td>`;
        }
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div></div>`;
  });

  // Monthly attendance summary per employee
  if(emps.length){
    h+=`<div style="margin-top:.5rem;overflow-x:auto"><table class="htable"><thead><tr>
      <th>Employee</th><th class="r" style="color:#16a34a">Present</th><th class="r" style="color:#D97706">Late</th><th class="r" style="color:#DC2626">Absent</th><th class="r">Working Days</th><th class="r">Attendance %</th>
    </tr></thead><tbody>`;
    const monthDates=getMonthDates(ym).filter(d=>d<=today());
    emps.forEach(emp=>{
      const empAtt=att[emp]||{};
      let workDays=0,present=0,late=0,absent=0;
      monthDates.forEach(d=>{
        const shift=sched[emp]?.[d]||'';
        if(!shift||shift==='OFF'||shift==='VL')return;
        workDays++;
        const s=empAtt[d];
        if(s==='P')present++;
        else if(s==='L')late++;
        else if(s==='A')absent++;
      });
      const pct=workDays>0?Math.round((present+late)/workDays*100):null;
      const pctColor=pct===null?'var(--grey)':pct>=90?'var(--grn)':pct>=75?'#D97706':'var(--red)';
      h+=`<tr>
        <td style="font-weight:700">${esc(emp)}</td>
        <td class="r" style="font-weight:700;color:#16a34a">${present}</td>
        <td class="r" style="font-weight:700;color:#D97706">${late}</td>
        <td class="r" style="font-weight:700;color:#DC2626">${absent}</td>
        <td class="r" style="color:var(--grey)">${workDays}</td>
        <td class="r" style="font-weight:900;color:${pctColor}">${pct!==null?pct+'%':'—'}</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;

  panel.innerHTML=h;
}

function exportBackup(){
  const data={_meta:{exportedAt:new Date().toISOString(),branch:ST.branch,version:1}};
  Object.keys(localStorage).forEach(k=>{if(k.startsWith('nyfd_'))data[k]=localStorage.getItem(k)});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='nyfd-backup-'+today()+'.json';
  a.click();
  showToast('Backup downloaded ✓');
}
function importBackup(input){
  const file=input.files[0];
  if(!file)return;
  if(!confirm('This will overwrite ALL current data in this browser.\n\nAre you sure you want to restore from this backup?')){
    input.value='';return;
  }
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      let count=0;
      Object.entries(data).forEach(function(entry){
        const k=entry[0],v=entry[1];
        if(k.startsWith('nyfd_')){lsSet(k,v);count++;}
      });
      showToast('Restored '+count+' entries — reloading…');
      setTimeout(function(){location.reload();},1200);
    }catch(err){
      alert('Invalid backup file. Please use a valid NYFD backup JSON.');
    }
    input.value='';
  };
  reader.readAsText(file);
}

  // ── This Week vs Last Week ───────────────────────────────────
  (function(){

// ── REVENUE DASHBOARD — ALL BRANCHES AGGREGATE ───────────────────
function renderRevenueDashAll(panel,t,ym,selH,branches){
  // Aggregate today + this month + 6-month trend across all branches
  var totToday={gross:0,net:0,cash:0,online:0,variance:0,cust:0};
  var totMonth={gross:0,net:0,variance:0,cust:0,days:0};
  var lmDate=new Date(ym+'-01');lmDate.setMonth(lmDate.getMonth()-1);
  var lmYm=lmDate.toISOString().slice(0,7);
  var totLmNet=0;
  // 6-month buckets
  var months6=[];
  for(var mi=5;mi>=0;mi--){var md=new Date(ym+'-01');md.setMonth(md.getMonth()-mi);months6.push({ym:md.toISOString().slice(0,7),label:md.toLocaleString('en-PH',{month:'short',year:'2-digit'}),byBranch:{}});}
  var itemT={};ORDER_ITEMS.forEach(function(it){itemT[it]=0;});
  var brMonthRows=[];
  var prev=ST.branch;
  branches.forEach(function(br){
    ST.branch=br;
    var allD=getAllSalesDates();
    // today
    var ts=loadSales(t);
    if(ts){var tc=computeSales(ts);totToday.gross+=tc.gross;totToday.net+=tc.netSales;totToday.cash+=tc.totalCash;totToday.online+=tc.creditSales;totToday.variance+=tc.variance;totToday.cust+=parseN(ts.custCount);}
    // this month
    var mDts=allD.filter(function(d){return d.startsWith(ym);});
    var brNet=0,brGross=0;
    mDts.forEach(function(d){var r=loadSales(d);if(!r)return;var c=computeSales(r);totMonth.gross+=c.gross;totMonth.net+=c.netSales;totMonth.variance+=c.variance;totMonth.cust+=parseN(r.custCount);brNet+=c.netSales;brGross+=c.gross;});
    totMonth.days=Math.max(totMonth.days,mDts.length);
    // last month
    var lmDts=allD.filter(function(d){return d.startsWith(lmYm);});
    lmDts.forEach(function(d){var r=loadSales(d);if(r)totLmNet+=computeSales(r).netSales;});

// ── STOCK DASHBOARD ───────────────────────────────────────────────
function renderStockDash(){
  const panel=document.getElementById('tp-stockdash');
  const t=today();
  const ym=t.slice(0,7);
  const invDates=getAllInvDates();
  const latestInv=invDates.length?loadInv(invDates[0]):null;

  const allInvDatesM=getAllInvDates().filter(function(d){return d.startsWith(ym);});
  const wastageByItem={};
  allInvDatesM.forEach(function(d){
    var inv=loadInv(d);if(!inv)return;
    ALL_INV_ITEMS.forEach(function(n){var w=parseN((inv.items&&inv.items[n]?inv.items[n].wst:'')||'');if(w>0)wastageByItem[n]=(wastageByItem[n]||0)+w;});
  });
  const wastageList=Object.entries(wastageByItem).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  const warehouses=loadWH();
  const storStatus=[];
  warehouses.forEach(function(wh){
    var pfx='nyfd_stor_'+wh.replace(/\s+/g,'_')+'_';
    var keys=Object.keys(localStorage).filter(function(k){return k.startsWith(pfx);});
    if(!keys.length){storStatus.push({wh:wh,lowCount:0,items:[],lastDate:null});return;}
    var latest=JSON.parse(localStorage.getItem(keys.slice().sort().reverse()[0]));
    var lowInWh=[];
    ALL_STOR_ITEMS.forEach(function(n){var q=latest.items?latest.items[n]:undefined;if(q!==undefined&&q!==''&&parseN(q)<=2)lowInWh.push({name:n,qty:parseN(q)});});
    storStatus.push({wh:wh,lowCount:lowInWh.length,items:lowInWh,lastDate:keys.slice().sort().reverse()[0].replace(pfx,'')});
  });
  const catSummary=INV_CATS.map(function(cat){
    var catItems=cat.items.map(function(item){
      var cl=latestInv?parseN((latestInv.items&&latestInv.items[item.n]?latestInv.items[item.n].cl:null)??''):null;
      if(latestInv&&latestInv.items&&latestInv.items[item.n]){cl=latestInv.items[item.n].cl!==undefined&&latestInv.items[item.n].cl!==''?parseN(latestInv.items[item.n].cl):null;}
      var status=cl===null?'no-data':cl===0?'out':cl<=2?'low':'ok';
      return{name:item.n,cl:cl,status:status};
    });
    var out=catItems.filter(function(x){return x.status==='out';}).length;
    var low=catItems.filter(function(x){return x.status==='low';}).length;
    return{name:cat.name,items:catItems,out:out,low:low};
  });

  const storLowTotal=storStatus.reduce(function(s,w){return s+w.lowCount;},0);

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">'
    +'<div style="font-weight:800;font-size:1.05rem">🗂 Stock &amp; Inventory Dashboard</div>'
    +'<div style="font-size:.78rem;color:var(--grey)">Last inv: '+(invDates.length?fmtDate(invDates[0]):'No data')+'</div></div>';

  h+='<div class="sgrid">'
    +'<div class="scard r"><div class="sl">Out of Stock</div><div class="sv neg">'+outCount+'</div></div>'
    +'<div class="scard" style="border-left-color:var(--org)"><div class="sl">Low Stock (≤2)</div><div class="sv" style="color:var(--org)">'+lowCount+'</div></div>'
    +'<div class="scard"><div class="sl">Storage Alerts</div><div class="sv '+(storLowTotal>0?'neg':'')+'">'+storLowTotal+'</div></div>'
    +'<div class="scard g"><div class="sl">Categories OK</div><div class="sv pos">'+catSummary.filter(function(c){return c.out===0&&c.low===0;}).length+' / '+catSummary.length+'</div></div>'
    +'</div>';

  h+='<div class="card"><div class="ctitle">📦 Shop Inventory Status — '+(invDates.length?fmtDate(invDates[0]):'No data yet')+'</div>';

    h+='<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:.75rem">No inventory data recorded yet.</p>';
  }else{
    catSummary.forEach(function(cat){
      h+='<div style="margin-bottom:.85rem">'
        +'<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem">'

      cat.items.forEach(function(item){

        var col=item.status==='out'?'#EF4444':item.status==='low'?'var(--org)':item.status==='ok'?'var(--grn)':'var(--grey)';

          +(needsReorder?'<button onclick="quickAddPO(\''+item.name.replace(/'/g,"\\'")+"','"+unit.replace(/'/g,"\\'")+"')\" title=\"Add to purchase queue\" style=\"background:#fff;border:1px solid currentColor;border-radius:4px;padding:.05rem .28rem;font-size:.65rem;cursor:pointer;color:inherit;font-weight:900;line-height:1.3\">+PO</button>":'')

      h+='<span style="font-size:.78rem;color:var(--grey)">No data recorded yet.</span>';
    }
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="card"><div class="ctitle">🗑 Wastage This Month — '+ym+'</div>';
  if(!wastageList.length){
    h+='<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:.5rem">No wastage recorded this month.</p>';
  }else{

        +'<div style="display:flex;justify-content:space-between;margin-bottom:.2rem">'

        +'<div style="background:var(--grey2);border-radius:20px;height:7px;overflow:hidden">'
        +'<div style="background:#EF4444;width:'+pct+'%;height:100%;border-radius:20px"></div>'
        +'</div></div>';
    });
  }
  h+='</div>';

  // ── Purchase Orders ───────────────────────────────────────────
  var allPOs=loadPOs();
  var _pof=ST.poFilter||'open';

  var _poNeeded=allPOs.filter(function(p){return p.status==='needed';}).length;
  var _poOrdered=allPOs.filter(function(p){return p.status==='ordered';}).length;
  var _poReceived=allPOs.filter(function(p){return p.status==='received';}).length;
  var _statusLabel={needed:'🔴 Needed',ordered:'🟡 Ordered',received:'✅ Received'};
  var _statusBg={needed:'#FEE2E2',ordered:'#FEF3C7',received:'#D1FAE5'};
  var _statusCol={needed:'#991B1B',ordered:'#92400E',received:'#065F46'};

  h+='<div class="card" style="border-top:3px solid var(--org)">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">'
    +'<div class="ctitle" style="margin:0;border:none;padding:0">📋 Purchase Orders</div>'
    +'<div style="display:flex;gap:.35rem;flex-wrap:wrap">';
  [{v:'open',l:'Open ('+(+_poNeeded+ +_poOrdered)+')'},{v:'needed',l:'🔴 Needed'},{v:'ordered',l:'🟡 Ordered'},{v:'received',l:'✅ Received'},{v:'all',l:'All'}].forEach(function(f){
    var active=_pof===f.v;
    h+='<button onclick="setPOFilter(\''+f.v+'\')" style="font-size:.73rem;padding:.2rem .6rem;border-radius:12px;border:1.5px solid '+(active?'var(--org)':'var(--bdr)')+';background:'+(active?'var(--org)':'#fff')+';color:'+(active?'#fff':'#374151')+';font-weight:700;cursor:pointer">'+f.l+'</button>';
  });
  h+='</div></div>';

  // Inline add form
  var _allInvItemNames=[];INV_CATS.forEach(function(c){c.items.forEach(function(i){_allInvItemNames.push(i.n);});});
  h+='<datalist id="po-item-list">';
  _allInvItemNames.forEach(function(n){h+='<option value="'+esc(n)+'"></option>';});
  h+='</datalist>';
  h+='<div style="display:grid;grid-template-columns:1fr auto auto 1fr auto;gap:.4rem;align-items:flex-end;margin-bottom:.75rem;flex-wrap:wrap">'
    +'<div><label style="font-size:.68rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:.2rem">Item</label>'
    +'<input id="po-item" list="po-item-list" placeholder="Type or select item…" style="width:100%;padding:.35rem .5rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.83rem" oninput="var u=getInvUnit(this.value);var el=document.getElementById(\'po-unit\');if(el&&u)el.value=u;"></div>'
    +'<div><label style="font-size:.68rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:.2rem">Qty</label>'
    +'<input id="po-qty" type="number" min="1" placeholder="1" style="width:70px;padding:.35rem .4rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.83rem"></div>'
    +'<div><label style="font-size:.68rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:.2rem">Unit</label>'
    +'<input id="po-unit" placeholder="bags" style="width:68px;padding:.35rem .4rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.83rem"></div>'
    +'<div><label style="font-size:.68rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:.2rem">Supplier</label>'
    +'<input id="po-supplier" placeholder="Optional" style="width:100%;padding:.35rem .5rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.83rem"></div>'
    +'<button onclick="submitAddPO()" style="background:var(--org);color:#fff;border:none;border-radius:7px;padding:.38rem .85rem;font-size:.83rem;font-weight:800;cursor:pointer;height:34px">＋ Add</button>'
    +'</div>';

  if(!_poFiltered.length){
    h+='<p style="font-size:.875rem;color:var(--grey);text-align:center;padding:.5rem">'+(_pof==='open'?'No open purchase orders. Great! 🎉':'No entries for this filter.')+'</p>';
  }else{
    h+='<div style="overflow-x:auto"><table class="ft"><thead><tr>'
      +'<th>Item</th><th class="r">Qty</th><th>Supplier</th><th>Requested</th><th>Status</th><th>Actions</th>'
      +'</tr></thead><tbody>';
    _poFiltered.forEach(function(po){
      var sl=_statusLabel[po.status]||po.status;
      var sbg=_statusBg[po.status]||'var(--grey2)';
      var scol=_statusCol[po.status]||'var(--grey)';
      var actions='';
      if(po.status==='needed')actions='<button onclick="updatePOStatus(\''+po.id+'\',\'ordered\')" style="background:#FEF3C7;color:#92400E;border:none;border-radius:5px;padding:.18rem .45rem;font-size:.72rem;font-weight:800;cursor:pointer;margin-right:.2rem">Mark Ordered</button>';
      if(po.status==='ordered')actions='<button onclick="updatePOStatus(\''+po.id+'\',\'received\')" style="background:#D1FAE5;color:#065F46;border:none;border-radius:5px;padding:.18rem .45rem;font-size:.72rem;font-weight:800;cursor:pointer;margin-right:.2rem">Mark Received</button>';
      actions+='<button onclick="deletePO(\''+po.id+'\')" style="background:#FEE2E2;color:#EF4444;border:none;border-radius:5px;padding:.18rem .4rem;font-size:.72rem;font-weight:800;cursor:pointer">✕</button>';
      h+='<tr>'
        +'<td style="font-weight:700">'+esc(po.item)+(po.note?'<span style="display:block;font-size:.68rem;color:var(--grey)">'+esc(po.note)+'</span>':'')+'</td>'
        +'<td class="r" style="font-weight:800">'+po.qty+(po.unit?' '+esc(po.unit):'')+'</td>'
        +'<td style="font-size:.8rem;color:var(--grey)">'+esc(po.supplier||'—')+'</td>'
        +'<td style="font-size:.78rem;white-space:nowrap">'+(po.orderedDate?'Ord: '+fmtDate(po.orderedDate):fmtDate(po.createdDate))+'</td>'
        +'<td><span style="background:'+sbg+';color:'+scol+';border-radius:10px;padding:.1rem .45rem;font-size:.72rem;font-weight:800">'+sl+'</span></td>'
        +'<td style="white-space:nowrap">'+actions+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';

  // ── Restock Summary ──────────────────────────────────────────
  var rkPfx='nyfd_restock_'+ST.branch.replace(/\s+/g,'_')+'_';
  var rkKeys=Object.keys(localStorage).filter(function(k){return k.startsWith(rkPfx);});
  var allRestocks=[];
  rkKeys.forEach(function(k){var arr=JSON.parse(localStorage.getItem(k)||'[]');arr.forEach(function(e){e._date=k.replace(rkPfx,'');allRestocks.push(e);});});
  allRestocks.sort(function(a,b){return b._date.localeCompare(a._date);});
  var rkMonthRestocks=allRestocks.filter(function(e){return e._date&&e._date.startsWith(ym);});
  var rkMonthSpend=rkMonthRestocks.reduce(function(s,e){return s+parseN(e.totalCost);},0);
  var rkTotals={};
  rkMonthRestocks.forEach(function(e){rkTotals[e.item]=(rkTotals[e.item]||0)+parseN(e.qty);});
  var rkTopItems=Object.entries(rkTotals).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var rkRecent=allRestocks.slice(0,12);

  h+='<div class="card"><div class="ctitle" style="display:flex;justify-content:space-between;align-items:center">'
    +'<span>🛒 Restock &amp; Purchase Summary — '+ym+'</span>'
    +(rkMonthSpend>0?'<span style="font-size:.82rem;font-weight:900;color:var(--red)">Month Spend: '+fmtPHP(rkMonthSpend)+'</span>':'')
    +'</div>';

  if(!allRestocks.length){
    h+='<p style="font-size:.875rem;color:var(--grey);text-align:center;padding:.5rem">No restock entries yet. Log deliveries in the Inventory tab.</p>';
  }else{
    // KPI strip
    h+='<div class="sgrid" style="margin-bottom:.9rem">'
      +'<div class="scard y"><div class="sl">Month Spend</div><div class="sv">'+fmtPHP(rkMonthSpend)+'</div></div>'
      +'<div class="scard"><div class="sl">Entries This Month</div><div class="sv">'+rkMonthRestocks.length+'</div></div>'
      +'<div class="scard"><div class="sl">Unique Items</div><div class="sv">'+Object.keys(rkTotals).length+'</div></div>'
      +'<div class="scard"><div class="sl">Total All-Time</div><div class="sv">'+allRestocks.length+'</div></div>'
      +'</div>';

    // Top restocked items this month
    if(rkTopItems.length){
      var rkMax=rkTopItems[0][1];
      h+='<div style="margin-bottom:.9rem"><div style="font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:var(--grey);margin-bottom:.5rem">Top Restocked Items This Month</div>';
      rkTopItems.forEach(function(entry){
        var pct=rkMax>0?Math.round(entry[1]/rkMax*100):0;
        h+='<div style="margin-bottom:.4rem">'
          +'<div style="display:flex;justify-content:space-between;margin-bottom:.15rem">'
          +'<span style="font-size:.83rem;font-weight:700">'+esc(entry[0])+'</span>'
          +'<span style="font-size:.78rem;color:var(--grey);font-weight:700">'+entry[1]+' units</span></div>'
          +'<div style="background:var(--grey2);border-radius:20px;height:7px;overflow:hidden">'
          +'<div style="background:var(--yel);width:'+pct+'%;height:100%;border-radius:20px"></div>'
          +'</div></div>';
      });
      h+='</div>';
    }

    // Recent restocks table
    h+='<div style="overflow-x:auto"><table class="htable"><thead><tr>'
      +'<th>Date</th><th>Item</th><th class="r">Qty</th><th>Supplier</th><th class="r">Total Cost</th>'
      +'</tr></thead><tbody>';
    rkRecent.forEach(function(e){
      var isToday=e._date===t;
      h+='<tr style="'+(isToday?'background:var(--yel-bg)':'')+'">'
        +'<td style="font-size:.78rem;white-space:nowrap;font-weight:'+(isToday?'800':'400')+'">'+fmtDate(e._date)+'</td>'
        +'<td style="font-weight:700">'+esc(e.item)+'<span style="font-size:.68rem;color:var(--grey);display:block">'+(e.unit||'')+(e.note?' · '+esc(e.note):'')+'</span></td>'
        +'<td class="r" style="font-weight:700">'+e.qty+'</td>'
        +'<td style="font-size:.8rem;color:var(--grey)">'+esc(e.supplier||'—')+'</td>'
        +'<td class="r" style="font-weight:800">'+(e.totalCost?fmtPHP(e.totalCost):'—')+'</td>'
        +'</tr>';
    });
    if(allRestocks.length>12)h+='<tr><td colspan="5" style="text-align:center;font-size:.75rem;color:var(--grey);padding:.5rem">… and '+(allRestocks.length-12)+' more entries</td></tr>';
    h+='</tbody></table></div>';
  }
  h+='</div>';

  panel.innerHTML=h;
}

// ── EMPLOYEE DASHBOARD ───────────────────────────────────────────────
function renderEmployeeDash(){
  const panel=document.getElementById('tp-empdash');
  const t=today();
  const ym=t.slice(0,7);
  const parts=ym.split('-').map(Number);
  const yr=parts[0],mo=parts[1];
  const emps=loadEmps();
  const sched=loadSchedule(ym);
  const otLog=loadOT();
  const rates=loadRates();
  const mDates=getMonthDates(ym);
  const thisMonthOT=otLog.filter(function(e){return e.date&&e.date.startsWith(ym);});

  const empStats=emps.map(function(emp){
    var working=0,off=0,vl=0;
    mDates.forEach(function(d){var s=(sched[emp]&&sched[emp][d])||'';if(s==='OFF')off++;else if(s==='VL')vl++;else if(s)working++;});
    var otHrs=thisMonthOT.filter(function(e){return e.emp===emp;}).reduce(function(s,e){return s+parseN(e.hours);},0);
    var dr=parseN(rates[emp]||'');
    var otCost=dr>0?thisMonthOT.filter(function(e){return e.emp===emp;}).reduce(function(s,e){return s+parseN(e.hours)*dr/8;},0):0;
    return{emp:emp,working:working,off:off,vl:vl,otHrs:otHrs,otCost:otCost,dr:dr};
  });
  const todayShifts=emps.map(function(emp){return{emp:emp,shift:(sched[emp]&&sched[emp][t])||''};});
  const todayWorking=todayShifts.filter(function(x){return x.shift&&x.shift!=='OFF'&&x.shift!=='VL';});
  const todayVl=todayShifts.filter(function(x){return x.shift==='VL';});
  var totalOTCost=0,totalOTHrs=0;
  empStats.forEach(function(e){totalOTCost+=e.otCost;totalOTHrs+=e.otHrs;});

  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">'
    +'<div style="font-weight:800;font-size:1.05rem">👥 Employee Dashboard</div>'
    +'<div style="font-size:.78rem;color:var(--grey)">'+MO_FULL[mo-1]+' '+yr+'</div></div>';

  h+='<div class="sgrid">'
    +'<div class="scard g"><div class="sl">Working Today</div><div class="sv">'+todayWorking.length+' / '+emps.length+'</div></div>'
    +'<div class="scard"><div class="sl">On Leave Today</div><div class="sv">'+todayVl.length+'</div></div>'
    +'<div class="scard"><div class="sl">OT Hours (MTD)</div><div class="sv">'+totalOTHrs+' hrs</div></div>'
    +'<div class="scard y"><div class="sl">OT Cost (MTD)</div><div class="sv">'+(totalOTCost>0?fmtPHP(totalOTCost):'—')+'</div></div>'
    +'</div>';

  h+='<div class="card"><div class="ctitle">📅 Today\'s Schedule — '+fmtDate(t)+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.55rem">';
  emps.forEach(function(emp){
    var shift=(sched[emp]&&sched[emp][t])||'';
    var isOff=!shift||shift==='OFF';var isVl=shift==='VL';
    var bg=isVl?'#FBEAF0':isOff?'var(--grey2)':'var(--grn-bg)';
    var col=isVl?'#993556':isOff?'var(--grey)':'var(--grn)';
    var badge=isVl?'VL':isOff?'OFF':shift;
    h+='<div style="background:'+bg+';border-radius:8px;padding:.6rem .85rem;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-weight:700;font-size:.84rem">'+esc(emp)+'</span>'
      +'<span style="font-size:.75rem;font-weight:800;color:'+col+'">'+(badge||'—')+'</span></div>';
  });
  h+='</div></div>';

  h+='<div class="card"><div class="ctitle">📊 Monthly Attendance — '+MO_FULL[mo-1]+' '+yr+'</div>'
    +'<div style="overflow-x:auto"><table class="htable"><thead><tr>'
    +'<th>Employee</th><th class="r">Working</th><th class="r">OFF</th><th class="r">VL</th>'
    +'<th class="r">OT Hrs</th><th class="r">OT Cost</th><th class="r">Daily Rate</th>'
    +'</tr></thead><tbody>';
  empStats.forEach(function(e){
    h+='<tr><td style="font-weight:700">'+esc(e.emp)+'</td>'
      +'<td class="r"><span style="background:var(--grn-bg);color:var(--grn);border-radius:10px;padding:.1rem .45rem;font-size:.78rem;font-weight:800">'+e.working+'</span></td>'
      +'<td class="r" style="color:var(--grey)">'+e.off+'</td>'
      +'<td class="r" style="color:#993556">'+e.vl+'</td>'
      +'<td class="r" style="font-weight:700">'+(e.otHrs||'—')+'</td>'
      +'<td class="r">'+(e.otCost>0?fmtPHP(e.otCost):'—')+'</td>'
      +'<td class="r" style="color:var(--grey)">'+(e.dr>0?fmtPHP(e.dr)+'/day':'not set')+'</td>'
      +'</tr>';
  });
  var totWorking=empStats.reduce(function(s,e){return s+e.working;},0);
  var totOff=empStats.reduce(function(s,e){return s+e.off;},0);
  var totVl=empStats.reduce(function(s,e){return s+e.vl;},0);
  h+='<tr style="background:var(--yel-bg)">'
    +'<td style="font-weight:900">TOTALS</td>'
    +'<td class="r" style="font-weight:900">'+totWorking+'</td>'
    +'<td class="r" style="font-weight:900">'+totOff+'</td>'
    +'<td class="r" style="font-weight:900">'+totVl+'</td>'
    +'<td class="r" style="font-weight:900">'+totalOTHrs+' hrs</td>'
    +'<td class="r" style="font-weight:900">'+(totalOTCost>0?fmtPHP(totalOTCost):'—')+'</td>'
    +'<td></td></tr></tbody></table></div></div>';

  h+='<div class="card"><div class="ctitle">⏱ OT Log — '+MO_FULL[mo-1]+' '+yr+'</div>';
  if(!thisMonthOT.length){
    h+='<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:.5rem">No OT entries this month.</p>';
  }else{
    h+='<div style="overflow-x:auto"><table class="htable"><thead><tr>'
      +'<th>Date</th><th>Employee</th><th class="r">Hours</th><th class="r">Cost (₱)</th><th>Reason</th>'
      +'</tr></thead><tbody>';
    thisMonthOT.slice().sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(e){
      var dr=parseN(rates[e.emp]||'');
      var cost=dr>0?parseN(e.hours)*dr/8:null;
      h+='<tr><td style="white-space:nowrap">'+fmtDate(e.date)+'</td>'
        +'<td style="font-weight:700">'+esc(e.emp)+'</td>'
        +'<td class="r" style="font-weight:700">'+e.hours+'</td>'
        +'<td class="r">'+(cost!==null?fmtPHP(cost):'—')+'</td>'
        +'<td style="font-size:.82rem">'+esc(e.reason||'')+'</td></tr>';
    });
    h+='</tbody></table></div>';
    if(totalOTCost>0)h+='<div style="margin-top:.65rem;padding:.6rem .85rem;background:var(--yel-bg);border-radius:8px;display:flex;justify-content:space-between">'
      +'<span style="font-size:.82rem;font-weight:700;color:#6B4400">Monthly Total OT Cost</span>'
      +'<span style="font-size:1rem;font-weight:900;color:#6B4400">'+fmtPHP(totalOTCost)+'</span></div>';
  }
  h+='</div>';

  // ── Payroll Summary ────────────────────────────────────────────
  var _pp=ST.payrollPeriod||'full';
  var _allMDates=getMonthDates(ym);
  var _periodDates;
  if(_pp==='first')_periodDates=_allMDates.filter(function(d){return parseInt(d.slice(8))<=15;});
  else if(_pp==='second')_periodDates=_allMDates.filter(function(d){return parseInt(d.slice(8))>15;});
  else _periodDates=_allMDates;
  var _attData=loadAtt(ym);
  var _payRows=emps.map(function(emp){
    var dr=parseN(rates[emp]||'');
    // Days worked: use attendance P markers if any exist for this emp, else count scheduled working days
    var hasAttData=_attData[emp]&&Object.keys(_attData[emp]).length>0;
    var daysWorked=_periodDates.filter(function(d){

  _payRows.forEach(function(r){

  h+='<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.25rem">'

// ── P&L TAB ────────────────────────────────────────────────────
function renderPL(date){
  const panel=document.getElementById('tp-pnl');
  const saved=loadPL(date);
  const sales=loadSales(date);
  const sched=loadSchedule(date.slice(0,7));
  const otLog=loadOT();
  const rates=loadRates();
  const fc=loadFC();
  const ro=isRO();

  // Revenue from saved sales
  const salesComp=sales?computeSales(sales):null;
  const gross=salesComp?salesComp.gross:0;

  // Staff from schedule
  const emps=loadEmps();
  const staffOnDutyList=emps.filter(function(e){
    var s=(sched[e]&&sched[e][date])||'';return s&&s!=='OFF'&&s!=='VL';
  });
  const staffOnDuty=staffOnDutyList.length;
  // Sum actual rates for staff on duty; fall back to 658 if rate not set
  const salaryFromRates=staffOnDutyList.reduce(function(s,e){return s+parseN(rates[e]||658);},0);

  // OT cost for this date
  const dayOT=otLog.filter(function(e){return e.date===date;});
  const otCost=dayOT.reduce(function(s,e){
    var dr=parseN(rates[e.emp]||'');return s+(dr>0?parseN(e.hours)*dr/8:0);
  },0);

  // Saved overrides / CoGS
  const sv=saved||{};
  // If no saved P&L for this date, pre-fill COGS:
  //   1st choice — today's restock purchases (most accurate for this day)
  //   2nd choice — last saved P&L's COGS (baseline estimate)
  const _isAutofill=!saved&&!!sales;
  const _lastPL=_isAutofill?getLastSavedPL(date):null;
  const _rkTotalForCOGS=loadRestocks(date).filter(function(e){return e.status!=='rejected';}).reduce(function(s,e){return s+parseN(e.totalCost);},0);
  const _cogsPrefillSource=_isAutofill?(_rkTotalForCOGS>0?'restock':(_lastPL?'lastpl':null)):null;
  const cogsMode=sv.cogsMode||(_lastPL&&_lastPL.cogsMode)||'total';
  const cogsTotal=sv.cogsTotal!==undefined?sv.cogsTotal:
    (_cogsPrefillSource==='restock'?_rkTotalForCOGS.toFixed(2):
    (_cogsPrefillSource==='lastpl'?(_lastPL.cogsTotal||''):''));
  const cogsItems=sv.cogsItems||(_lastPL&&_lastPL.cogsItems)||{};
  const otherExpenses=sv.otherExpenses||[{name:'',amt:''}];
  const fcOvr=sv.fixedOverrides||{};

  // ── Monthly P&L Summary ────────────────────────────────────────
  var plSumYm=date.slice(0,7);
  var plSumDates=getAllSalesDates(); // all sales dates to cross-ref
  // Get all dates that have P&L data for this branch in this month
  var plPfx='nyfd_pl_'+ST.branch.replace(/\s+/g,'_')+'_';
  var plAllKeys=Object.keys(localStorage).filter(function(k){return k.startsWith(plPfx)&&k.replace(plPfx,'').startsWith(plSumYm);});
  var plSumDays=plAllKeys.length;
  var daysInPlMonth=new Date(parseInt(plSumYm.slice(0,4)),parseInt(plSumYm.slice(5,7)),0).getDate();
  var plSumGross=0,plSumFC=0,plSumCOGS=0,plSumLabor=0,plSumOther=0,plSumExp=0,plSumRk=0,plSumNet=0;
  plAllKeys.forEach(function(k){
    var pd=JSON.parse(localStorage.getItem(k)||'null');if(!pd)return;
    // Gross from sales data for that date
    var pd_date=k.replace(plPfx,'');
    var salesRec=loadSales(pd_date);
    if(salesRec)plSumGross+=computeSales(salesRec).gross;
    // Fixed costs
    var fc2=pd.fixedOverrides||{};
    var defFC=loadFC();
    Object.keys(defFC).forEach(function(fk){plSumFC+=parseN(fc2[fk]!==undefined?fc2[fk]:defFC[fk]);});
    // Labor
    plSumLabor+=parseN(pd.laborOverride||0)+parseN(pd.otOverride||0)+parseN(pd.holiday||0);
    // COGS
    if(pd.cogsMode==='total'){
      plSumCOGS+=parseN(pd.cogsTotal||0);
    }else{
      (pd.cogsItems?Object.values(pd.cogsItems):[]).forEach(function(v){plSumCOGS+=parseN(v);});
      plSumCOGS+=parseN(pd.cogsMisc||0);
    }
    // Other expenses (manual)
    (pd.otherExpenses||[]).forEach(function(e){plSumOther+=parseN(e.amt||0);});
    // Expense log + restock (saved separately)
    plSumExp+=parseN(pd.expLogTotal||0);
    plSumRk+=parseN(pd.rkLogTotal||0);
    // Net profit (use saved if available, else compute)
    if(typeof pd.netProfit==='number'){plSumNet+=pd.netProfit;}
  });
  var plSumTotalExp=plSumFC+plSumLabor+plSumOther+plSumExp+plSumRk+plSumCOGS;

  let h='';
  // Summary card
  h+='<div class="card" style="margin-bottom:.25rem">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-wrap:wrap;gap:.5rem">'
    +'<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">'
    +'<div class="ctitle" style="margin-bottom:0;border:none;padding:0">📊 Monthly P&L Summary</div>'
    +(function(){var mc=loadMonthClose(plSumYm);return mc?'<span style="background:#D1FAE5;color:#065F46;border-radius:12px;padding:.15rem .6rem;font-size:.72rem;font-weight:900;border:1px solid #BBF7D0">🔒 CLOSED '+new Date(mc.closedAt).toLocaleDateString('en-PH')+'</span>':'<span style="background:#FEF3C7;color:#92400E;border-radius:12px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;border:1px solid #FDE68A">Open</span>'})()
    +'</div>'
    +'<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">'
    +'<input type="month" id="pl-sum-month" value="'+plSumYm+'" style="font-size:.82rem;padding:.3rem .5rem;border:1.5px solid var(--bdr);border-radius:6px" onchange="renderPL(this.value+\'-01\')">'
    +'<span style="font-size:.75rem;color:var(--grey)">'+plSumDays+'/'+daysInPlMonth+' days with P&L</span>'
    +(ST.user&&ST.user.role==='owner'?'<button class="btn btn-sm btn-red" onclick="openMonthClose(\''+plSumYm+'\')" style="font-size:.75rem;padding:.25rem .65rem">🔒 Close Month</button>':'')
    +'</div></div>';

  if(!plSumDays){
    h+='<p style="font-size:.85rem;color:var(--grey);text-align:center;padding:.5rem">No P&L records saved for '+plSumYm+'.</p>';
  }else{
    h+='<div class="sgrid" style="margin-bottom:.75rem">'
      +'<div class="scard y"><div class="sl">Total Gross Revenue</div><div class="sv">'+fmtPHP(plSumGross)+'</div></div>'
      +'<div class="scard '+(plSumNet>=0?'g':'r')+'"><div class="sl">Total Net Profit</div><div class="sv '+(plSumNet>=0?'pos':'neg')+'">'+fmtPHP(plSumNet)+'</div></div>'
      +'<div class="scard"><div class="sl">Total Expenses</div><div class="sv">'+fmtPHP(plSumTotalExp)+'</div></div>'
      +'<div class="scard"><div class="sl">Profit Margin</div><div class="sv '+(plSumGross>0&&plSumNet/plSumGross>=0.1?'pos':'neg')+'">'+(plSumGross>0?(plSumNet/plSumGross*100).toFixed(1)+'%':'—')+'</div></div>'
      +'</div>'
      +'<div style="overflow-x:auto"><table class="htable" style="margin-bottom:.25rem"><tbody>'
      +'<tr style="background:var(--yel-bg)"><td style="font-weight:700">💵 Total Gross Revenue</td><td class="r" style="font-weight:900">'+fmtPHP(plSumGross)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">Fixed Costs</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumFC)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">CoGS</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumCOGS)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">Labor (Salary + OT)</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumLabor)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">Other Expenses (manual)</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumOther)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">Expense Log</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumExp)+'</td></tr>'
      +'<tr><td style="font-weight:600;color:var(--grey);padding-left:1.2rem">Stock Purchases / Deliveries</td><td class="r" style="color:var(--org)">-'+fmtPHP(plSumRk)+'</td></tr>'
      +'<tr style="border-top:2px solid var(--bdr)"><td style="font-weight:900">📈 Total Expenses</td><td class="r" style="font-weight:900;color:var(--org)">-'+fmtPHP(plSumTotalExp)+'</td></tr>'
      +'<tr style="background:'+(plSumNet>=0?'var(--grn-bg)':'#FEE2E2')+'"><td style="font-weight:900;font-size:1rem">💰 Net Profit</td><td class="r" style="font-weight:900;font-size:1rem;color:'+(plSumNet>=0?'var(--grn)':'var(--red)')+'">'+fmtPHP(plSumNet)+'</td></tr>'
      +'</tbody></table></div>';
  }
  h+='</div>';

  // ── Daily P&L form below ──────────────────────────────────────
  h+='<div class="dbar">'
    +'<label>📅 Date</label>'
    +'<input type="date" id="pl-date" value="'+date+'" onchange="renderPL(this.value)">'
    +(saved?(saved.autoSaved?'<span class="saved-badge" style="background:#E0F2FE;color:#0369A1;border-color:#BAE6FD">⚡ Auto-saved</span>':'<span class="saved-badge">✓ Saved</span>'):'')
    +(ro?'<span class="ro-badge">👁 View Only</span>':'')
    +'</div>';

  // Auto-save status banner
  if(saved&&saved.autoSaved&&!ro){
    if(saved.needsCOGS){
      h+='<div class="alert danger" style="margin-bottom:.75rem"><span class="ai">🚨</span><div><strong>COGS not entered yet.</strong> Revenue, labor, and expenses were auto-calculated from today\'s data. <strong>Enter your Cost of Goods below and click Save to complete this P&L.</strong></div></div>';
    }else{
      h+='<div class="alert success" style="margin-bottom:.75rem"><span class="ai">⚡</span><div><strong>P&L auto-calculated from today\'s data.</strong> Revenue, labor, expenses, and COGS (from restocks) are all filled in. Review and click Save to confirm, or adjust any field.</div></div>';
    }
  }else if(_isAutofill&&!ro){
    var _afMsg=_cogsPrefillSource==='restock'
      ?'⚡ <strong>COGS pre-filled from today\'s restock purchases ('+fmtPHP(_rkTotalForCOGS)+')</strong> — revenue &amp; labor also loaded automatically. Adjust if needed, then save.'

        ?'⚡ <strong>Pre-filled from last record</strong> — revenue &amp; labor loaded from today\'s data. COGS copied from previous entry as a starting point. <strong>Adjust COGS if needed, then save.</strong>'

    h+='<div class="alert warning" style="margin-bottom:.75rem"><span class="ai">📋</span><div>'+_afMsg+'</div></div>';
  }

      +'<td><input class="wi" type="text" id="pl-oname-'+i+'" value="'+esc(ex.name)+'" '+(ro?'disabled ':'')+' placeholder="e.g. Gas, Supplies..." style="font-size:.82rem"></td>'
      +'<td><input class="ni" type="number" min="0" step="0.01" id="pl-oamt-'+i+'" value="'+(ex.amt||'')+'" '+(ro?'disabled ':'')+' oninput="recomputePL()" placeholder="0" style="width:95px;text-align:right"></td>'

  // Restock log auto-line
  var rkTotalForPL=loadRestocks(date).reduce(function(s,e){return s+parseN(e.totalCost);},0);
  if(rkTotalForPL>0){

      +'<span>🛒 <strong>Stock Purchases / Deliveries</strong> <span style="color:var(--grey)">(from Restock Log — auto-included in total)</span></span>'
      +'<span style="font-weight:900">'+fmtPHP(rkTotalForPL)+'</span>'

  h+='</div>';

  // ── Cost of Goods
  h+='<div class="card"><div class="ctitle">🛒 Cost of Goods (CoGS)</div>';

    +'<button class="btn btn-sm '+(cogsMode==='total'?'btn-red':'btn-grey')+'" id="cogs-btn-total" onclick="plCogsMode(\'total\')">📝 Total Amount</button>'
    +'<button class="btn btn-sm '+(cogsMode==='items'?'btn-red':'btn-grey')+'" id="cogs-btn-items" onclick="plCogsMode(\'items\')">📦 By Item</button>'
    +'</div>';
  h+='<div id="cogs-total-wrap" style="display:'+(cogsMode==='total'?'block':'none')+'">'
    +'<div style="display:flex;align-items:center;gap:.65rem;flex-wrap:wrap">'
    +'<label style="font-size:.82rem;font-weight:700;color:var(--grey)">Total CoGS (₱)</label>'
    +'<input class="ni" type="number" min="0" step="0.01" id="pl-cogs-total" value="'+(cogsTotal)+'" '+(ro?'disabled ':'')+' oninput="recomputePL()" placeholder="e.g. 9615.55" style="width:130px;text-align:right">'
    +'</div></div>';
  h+='<div id="cogs-items-wrap" style="display:'+(cogsMode==='items'?'block':'none')+'">'
    +'<table class="ft"><thead><tr><th>Item</th><th class="r">Unit Cost (₱)</th><th class="r">Qty Used</th><th class="r">Total</th></tr></thead><tbody>';
  DEF_COGS_ITEMS.forEach(function(item,i){
    var qty=cogsItems[item.n]||'';
    var tot=qty?fmtPHP(parseN(qty)*item.cost):'';
    h+='<tr><td style="font-size:.82rem;font-weight:600">'+esc(item.n)+'</td>'
      +'<td class="r" style="font-size:.8rem;color:var(--grey)">₱'+item.cost.toFixed(2)+'</td>'
      +'<td><input class="ni" type="number" min="0" step="0.01" id="pl-ci-'+i+'" value="'+qty+'" '+(ro?'disabled ':'')+' oninput="recomputePL()" style="width:75px;text-align:right"></td>'
      +'<td class="r" id="pl-citot-'+i+'" style="font-weight:700">'+tot+'</td></tr>';
  });
  h+='<tr><td colspan="2" style="font-weight:900">OTHER / MISC CoGS</td>'
    +'<td></td>'
    +'<td><input class="ni" type="number" min="0" step="0.01" id="pl-cogs-misc" value="'+(sv.cogsMisc||'')+'" '+(ro?'disabled ':'')+' oninput="recomputePL()" placeholder="0" style="width:95px;text-align:right"></td></tr>';
  h+='<tr><td colspan="3" style="font-weight:900;background:var(--yel-bg)">TOTAL CoGS</td>'
    +'<td class="r" style="font-weight:900;background:var(--yel-bg)" id="pl-cogs-items-tot">—</td></tr>';

    +'<div class="cfield"><label>Total Expenses</label><div class="cv neg" id="pls-exp">—</div></div>'
    +'<div class="cfield"><label>Cost of Goods</label><div class="cv neg" id="pls-cogs">—</div></div>'
    +'<div class="cfield big" id="pls-net-wrap"><label>Net Profit</label><div class="cv" id="pls-net">—</div></div>'
    +'<div class="cfield"><label>Profit Margin</label><div class="cv" id="pls-margin">—</div></div>'

      +'<button class="btn btn-red" onclick="savePLForm()">💾 Save P&L</button>'

function plCogsMode(mode){
  window._plCogsMode=mode;
  var tw=document.getElementById('cogs-total-wrap');
  var iw=document.getElementById('cogs-items-wrap');
  var bt=document.getElementById('cogs-btn-total');
  var bi=document.getElementById('cogs-btn-items');
  if(tw)tw.style.display=mode==='total'?'block':'none';
  if(iw)iw.style.display=mode==='items'?'block':'none';
  if(bt){bt.className='btn btn-sm '+(mode==='total'?'btn-red':'btn-grey');}
  if(bi){bi.className='btn btn-sm '+(mode==='items'?'btn-red':'btn-grey');}
  recomputePL();
}

function plAddOther(){
  var body=document.getElementById('pl-other-body');if(!body)return;
  var rows=body.querySelectorAll('tr').length;
  var tr=document.createElement('tr');tr.id='pl-orow-'+rows;
  tr.innerHTML='<td><input class="wi" type="text" id="pl-oname-'+rows+'" placeholder="e.g. Gas, Supplies..." style="font-size:.82rem"></td>'
    +'<td><input class="ni" type="number" min="0" step="0.01" id="pl-oamt-'+rows+'" oninput="recomputePL()" placeholder="0" style="width:95px;text-align:right"></td>'
    +'<td><button onclick="plRemoveOther('+rows+')" style="background:#FEE2E2;color:#EF4444;border:none;border-radius:5px;padding:.18rem .4rem;cursor:pointer;font-size:.8rem;font-weight:800">✕</button></td>';
  body.appendChild(tr);
}

function plRemoveOther(i){
  var row=document.getElementById('pl-orow-'+i);
  if(row)row.remove();
  recomputePL();
}

function recomputePL(){
  var gross=window._plGross||0;
  var mode=window._plCogsMode||'total';

  // Fixed costs
  var fcTotal=0;
  Object.keys(DEF_FC).forEach(function(k){
    fcTotal+=parseN(document.getElementById('pl-fc-'+k)?.value);
  });

  // Labor
  var labor=parseN(document.getElementById('pl-labor')?.value);
  var ot=parseN(document.getElementById('pl-ot')?.value);
  var holiday=parseN(document.getElementById('pl-holiday')?.value);
  var laborTotal=labor+ot+holiday;

  // Other expenses (manual P&L rows)
  var otherTotal=0;
  var body=document.getElementById('pl-other-body');
  if(body){body.querySelectorAll('tr').forEach(function(tr,i){
    otherTotal+=parseN(document.getElementById('pl-oamt-'+i)?.value);
  });}
  // Add expense log total (filter by approval when ON)
  var expDate=window._plDate||today();
  var _apprPL=loadApprovalSettings();
  var expLogTotal=loadExp(expDate).reduce(function(s,e){
    if(_apprPL.requireExpenseApproval&&(e.status==='rejected'||e.status==='pending'))return s;
    return s+parseN(e.amt);
  },0);
  otherTotal+=expLogTotal;
  // Add restock spend (filter by approval when ON)
  var rkDate=expDate;
  var rkLogTotal=loadRestocks(rkDate).reduce(function(s,e){
    if(_apprPL.requireRestockApproval&&(e.status==='rejected'||e.status==='pending'))return s;
    return s+parseN(e.totalCost);
  },0);
  var rkAlreadyInOther=false;
  if(body){body.querySelectorAll('tr').forEach(function(tr,i){var nm=(document.getElementById('pl-oname-'+i)||{}).value||'';if(nm.toLowerCase().indexOf('stock purchase')!==-1||nm.toLowerCase().indexOf('deliveries')!==-1)rkAlreadyInOther=true;});}
  if(!rkAlreadyInOther)otherTotal+=rkLogTotal;

  var totalExp=fcTotal+laborTotal+otherTotal;

  // CoGS
  var cogs=0;
  if(mode==='total'){
    cogs=parseN(document.getElementById('pl-cogs-total')?.value);
  }else{
    DEF_COGS_ITEMS.forEach(function(item,i){
      var qty=parseN(document.getElementById('pl-ci-'+i)?.value);
      var tot=qty*item.cost;
      cogs+=tot;
      var totEl=document.getElementById('pl-citot-'+i);
      if(totEl)totEl.textContent=tot?fmtPHP(tot):'';
    });
    cogs+=parseN(document.getElementById('pl-cogs-misc')?.value);
    var citot=document.getElementById('pl-cogs-items-tot');
    if(citot)citot.textContent=fmtPHP(cogs);
  }

  var netProfit=gross-totalExp-cogs;
  var margin=gross>0?(netProfit/gross*100):null;
  var laborPct=gross>0?(laborTotal/gross*100):null;

  // Fixed overhead for break-even
  var fc=loadFC();
  var fixedBase=Object.values(fc).reduce(function(s,v){return s+v;},0);

  // Update summary
  setMasked('pls-gross','gross',fmtPHP(gross));
  setMasked('pls-exp','expenses',fmtPHP(totalExp));
  setMasked('pls-cogs','cogs',fmtPHP(cogs));
  var netEl=document.getElementById('pls-net');
  if(netEl){if(canSee('netProfit')){netEl.textContent=fmtPHP(netProfit);}else{netEl.innerHTML='<span style="color:#9CA3AF;letter-spacing:3px">●●●</span>';}}
  var netWrap=document.getElementById('pls-net-wrap');
  if(netWrap)netWrap.className='cfield big '+(netProfit<0?'neg':'pos');
  setText('pls-margin',margin!==null?margin.toFixed(1)+'%':'—');
  setText('pls-labor-pct',laborPct!==null?laborPct.toFixed(1)+'%':'—');

  // Break-even alert
  var beEl=document.getElementById('pl-breakeven');
  if(beEl&&gross>0){
    var above=gross>fixedBase;
    var diff=gross-fixedBase;
    beEl.innerHTML='<div class="alert '+(above?'success':'danger')+'">'
      +'<div class="ai">'+(above?'✅':'🚨')+'</div>'
      +'<div><strong>Break-Even (Fixed Costs): '+fmtPHP(fixedBase)+'/day</strong>'
      +'<br>Today you are '+fmtPHP(Math.abs(diff))+' '+(above?'ABOVE — good':'BELOW — loss risk')+'</div>'
      +'</div>';
  }
}

function getSavePLOther(){
  var body=document.getElementById('pl-other-body');
  if(!body)return[];
  var out=[];
  body.querySelectorAll('tr').forEach(function(tr,i){
    var name=(document.getElementById('pl-oname-'+i)?.value||'').trim();
    var amt=document.getElementById('pl-oamt-'+i)?.value||'';
    if(name||amt)out.push({name:name,amt:amt});
  });
  return out;
}

function savePLForm(){
  var date=document.getElementById('pl-date')?.value;
  if(!date){alert('Select a date.');return;}
  var fc={};
  Object.keys(DEF_FC).forEach(function(k){
    fc[k]=parseN(document.getElementById('pl-fc-'+k)?.value);
  });
  var cogsItems={};
  DEF_COGS_ITEMS.forEach(function(item,i){
    var v=document.getElementById('pl-ci-'+i)?.value;if(v)cogsItems[item.n]=v;
  });
  var otherExpenses=getSavePLOther();
  var expLogTotal=loadExp(date).reduce(function(s,e){return s+parseN(e.amt);},0);
  var rkLogTotal=loadRestocks(date).reduce(function(s,e){return s+parseN(e.totalCost);},0);
  // Compute net profit for monthly summary aggregation
  var _gross=window._plGross||0;
  var _fcT=0;Object.keys(DEF_FC).forEach(function(k){_fcT+=parseN(fc[k]);});
  var _labT=parseN(document.getElementById('pl-labor')?.value)+parseN(document.getElementById('pl-ot')?.value)+parseN(document.getElementById('pl-holiday')?.value);
  var _othT=otherExpenses.reduce(function(s,e){return s+parseN(e.amt);},0)+expLogTotal+rkLogTotal;
  var _cogsMode=window._plCogsMode||'total';
  var _cogsT=_cogsMode==='total'?parseN(document.getElementById('pl-cogs-total')?.value):(function(){
    var c=parseN(document.getElementById('pl-cogs-misc')?.value||0);
    DEF_COGS_ITEMS.forEach(function(item,i){c+=parseN(document.getElementById('pl-ci-'+i)?.value||0)*item.cost;});
    return c;
  })();
  var data={
    autoSaved:false,
    needsCOGS:false,
    fixedOverrides:fc,
    laborOverride:document.getElementById('pl-labor')?.value||'',
    otOverride:document.getElementById('pl-ot')?.value||'',
    holiday:document.getElementById('pl-holiday')?.value||'',
    cogsMode:_cogsMode,
    cogsTotal:document.getElementById('pl-cogs-total')?.value||'',
    cogsItems:cogsItems,
    cogsMisc:document.getElementById('pl-cogs-misc')?.value||'',
    otherExpenses:otherExpenses,
    expLogTotal:expLogTotal,
    rkLogTotal:rkLogTotal,
    netProfit:_gross-_fcT-_labT-_othT-_cogsT,
  };
  var _ex3=loadPL(date);var _now3=new Date().toISOString();
  if(!_ex3||!_ex3.submitted_at){data.submitted_at=_now3;data.submitted_by=ST.user?.name||'Unknown';}
  else{data.submitted_at=_ex3.submitted_at;data.submitted_by=_ex3.submitted_by;}
  data.last_edited_at=_now3;data.last_edited_by=ST.user?.name||'Unknown';
  savePLData(date,data);
  showToast('P&L saved ✓');
  renderPL(date);
}

// ── INIT ──────────────────────────────────────────────────────────
loadCustomItems();
initUsers();
initEmps();
initWH();
initBranches();
