<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NYFD Shop Manager – inventory, scheduling, and daily operations for New York Fries & Dips locations.">
<meta name="theme-color" content="#C41E3A">
<title>New York Fries & Dips – Shop Manager</title>
<style>
:root{--red:#C41E3A;--red2:#9B1830;--red-bg:#FFF0F0;--yel:#FFC200;--yel2:#E6A800;--yel-bg:#FFF8E1;--grn:#2E7D32;--grn-bg:#E8F5E9;--org:#E65100;--org-bg:#FFF3E0;--grey:#6B7280;--grey2:#F3F4F6;--bdr:#E5E7EB;--sh:0 2px 8px rgba(0,0,0,.08);--r:10px;--ff:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:#F8F9FA;color:#1F2937;line-height:1.5;font-size:15px}
input,select,textarea,button{font-family:inherit;font-size:inherit}
button{cursor:pointer}
a{color:inherit}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,var(--red),#7B0010);display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:#fff;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:370px;box-shadow:0 24px 64px rgba(0,0,0,.3);text-align:center}
.logo-wrap{margin-bottom:1.75rem}
.logo-icon{width:76px;height:76px;background:var(--yel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto .7rem;box-shadow:0 4px 16px rgba(255,194,0,.5)}
.logo-wrap h1{font-size:1.25rem;font-weight:900;color:var(--red);letter-spacing:-.5px;line-height:1.2}
.logo-wrap p{font-size:.78rem;color:var(--grey);margin-top:.2rem}
.fg{text-align:left;margin-bottom:.9rem}
.fg label{display:block;font-size:.75rem;font-weight:700;color:var(--grey);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:.6rem .85rem;border:1.5px solid var(--bdr);border-radius:8px;font-size:.95rem;background:var(--grey2);transition:border-color .2s}
.fg input:focus{outline:none;border-color:var(--red);background:#fff}
.btn-login{width:100%;padding:.75rem;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:800;letter-spacing:.5px;margin-top:.25rem;transition:background .2s,transform .1s}
.btn-login:hover{background:var(--red2)}.btn-login:active{transform:scale(.98)}
.lerr{background:var(--red-bg);border:1px solid #FECACA;color:var(--red);border-radius:6px;padding:.45rem .75rem;font-size:.82rem;margin-bottom:.85rem;display:none}
.login-hint{font-size:.7rem;color:#9CA3AF;margin-top:.9rem;line-height:1.6}
.login-hint span{display:inline-block;background:#F3F4F6;border-radius:4px;padding:.1rem .4rem;margin:.1rem;font-family:monospace}

/* APP SHELL */
#app{display:none;min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,var(--red),#9B0020);color:#fff;padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hd-brand{display:flex;align-items:center;gap:.55rem;min-width:0}
.hd-icon{width:40px;height:40px;background:var(--yel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.hd-text h1{font-size:.95rem;font-weight:900;line-height:1.1;letter-spacing:-.2px;white-space:nowrap}
.hd-text p{font-size:.7rem;opacity:.85}
.hd-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.branch-sel{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:.3rem .55rem;font-size:.78rem;font-weight:600}
.branch-sel option{background:#8B0020;color:#fff}
.user-chip{background:rgba(255,255,255,.15);border-radius:20px;padding:.27rem .65rem;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
.udot{width:7px;height:7px;border-radius:50%;background:var(--yel);flex-shrink:0}
.btn-out{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:.3rem .55rem;font-size:.75rem;transition:background .2s}
.btn-out:hover{background:rgba(255,255,255,.32)}

/* TABS */
.tab-bar{background:#fff;border-bottom:2px solid var(--bdr);display:flex;overflow-x:auto;position:sticky;top:56px;z-index:100;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:.65rem 1rem;border:none;background:none;font-size:.82rem;font-weight:700;color:var(--grey);white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:.3rem}
.tab-btn:hover{color:var(--red)}.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* PANELS */
.tp{display:none;padding:1rem;max-width:860px;margin:0 auto;padding-bottom:3rem}
.tp.active{display:block}

/* CARD */
.card{background:#fff;border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--sh);margin-bottom:.9rem}
.ctitle{font-size:.75rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:2px solid var(--grey2);display:flex;align-items:center;gap:.4rem}

/* SUMMARY CARDS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem;margin-bottom:.9rem}
.scard{background:#fff;border-radius:var(--r);padding:.9rem 1rem;box-shadow:var(--sh);border-left:4px solid var(--red)}
.scard.y{border-left-color:var(--yel)}.scard.g{border-left-color:var(--grn)}.scard.r{border-left-color:#EF4444}
.scard .sl{font-size:.68rem;color:var(--grey);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.scard .sv{font-size:1.25rem;font-weight:900;color:#1F2937;margin-top:.2rem}
.scard .sv.pos{color:var(--grn)}.scard .sv.neg{color:#EF4444}

/* ALERTS */
.alert{border-radius:var(--r);padding:.75rem 1rem;display:flex;gap:.55rem;margin-bottom:.85rem;font-size:.85rem}
.alert.danger{background:var(--red-bg);border:1px solid #FECACA;color:#B91C1C}
.alert.warning{background:var(--org-bg);border:1px solid #FED7AA;color:var(--org)}
.alert.success{background:var(--grn-bg);border:1px solid #BBF7D0;color:var(--grn)}
.alert .ai{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
.alert strong{display:block;font-weight:800;margin-bottom:.15rem}

/* SECTION HEADERS */
.sh{background:var(--red);color:#fff;padding:.42rem .8rem;border-radius:6px;font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin:.9rem 0 .6rem;display:flex;align-items:center;gap:.35rem}
.sh:first-child{margin-top:0}
.sh.y{background:var(--yel);color:#5C3A00}
.sh.dk{background:#374151;color:#fff}

/* TABLES */
.ft{width:100%;border-collapse:collapse;font-size:.855rem}
.ft th{background:var(--grey2);padding:.45rem .55rem;text-align:left;font-size:.72rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr)}
.ft th.r{text-align:right}.ft td{padding:.3rem .5rem;border-bottom:1px solid var(--bdr);vertical-align:middle}
.ft tr:last-child td{border-bottom:none}.ft tr:hover td{background:#fafafa}
.ft td.iname{font-weight:600;font-size:.84rem}.ft td.cmp{text-align:right;font-weight:700}
.ft td.tot{background:var(--yel-bg);font-weight:900;font-size:.9rem}
.ft tr.ls td{background:var(--org-bg)}.ft tr.ls td.iname{color:var(--org)}

/* INPUTS */
.ni{width:80px;padding:.28rem .4rem;text-align:right;border:1.5px solid var(--bdr);border-radius:6px;font-size:.85rem;transition:border-color .2s}
.ni:focus{outline:none;border-color:var(--red);background:#fff}
.ni[readonly],.ni:disabled{background:var(--grey2);color:var(--grey);border-color:transparent;cursor:default}
.wi{width:100%;padding:.48rem .7rem;border:1.5px solid var(--bdr);border-radius:8px;font-size:.9rem;transition:border-color .2s}
.wi:focus{outline:none;border-color:var(--red)}
.wi[readonly]{background:var(--grey2);color:var(--grey)}

/* COMPUTED GRID */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.6rem 0}
.cfield{background:var(--grey2);border-radius:8px;padding:.55rem .8rem}
.cfield label{font-size:.68rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px}
.cfield .cv{font-size:1rem;font-weight:900;color:#1F2937;margin-top:.15rem}
.cfield.pos .cv{color:var(--grn)}.cfield.neg .cv{color:#EF4444}
.cfield.hl{background:var(--yel-bg);border:1.5px solid var(--yel)}
.cfield.hl .cv{color:#6B4400}
.cfield.big .cv{font-size:1.15rem}

/* DATE BAR */
.dbar{background:#fff;border-radius:var(--r);padding:.65rem 1rem;box-shadow:var(--sh);margin-bottom:.9rem;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.dbar label{font-size:.75rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.dbar input[type="date"]{padding:.4rem .65rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.88rem;color:#1F2937}
.dbar input[type="date"]:focus{outline:none;border-color:var(--red)}
.saved-badge{background:var(--yel-bg);border:1px solid var(--yel);border-radius:20px;padding:.2rem .65rem;font-size:.72rem;font-weight:800;color:#6B4400}
.ro-badge{background:var(--grey2);border-radius:20px;padding:.2rem .65rem;font-size:.72rem;font-weight:700;color:var(--grey)}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:.55rem 1.1rem;font-size:.85rem;font-weight:800;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem;text-decoration:none}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-yel{background:var(--yel);color:#5C3A00}.btn-yel:hover{background:var(--yel2)}
.btn-grey{background:var(--grey2);color:#374151}.btn-grey:hover{background:var(--bdr)}
.btn-sm{padding:.32rem .65rem;font-size:.76rem;border-radius:6px}
.btn-grp{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.9rem}

/* HISTORY TABLE */
.htable{width:100%;border-collapse:collapse;font-size:.855rem}
.htable th{background:var(--red);color:#fff;padding:.55rem .75rem;text-align:left;font-size:.74rem;text-transform:uppercase;letter-spacing:.4px}
.htable th.r{text-align:right}.htable td{padding:.5rem .75rem;border-bottom:1px solid var(--bdr)}
.htable tr:hover td{background:var(--grey2)}.htable td.r{text-align:right}
.vpos{color:var(--grn);font-weight:800}.vneg{color:#EF4444;font-weight:800}

/* FILTER BAR */
.fbar{background:#fff;border-radius:var(--r);padding:.65rem 1rem;box-shadow:var(--sh);margin-bottom:.85rem;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.fbar label{font-size:.78rem;font-weight:700;color:var(--grey);white-space:nowrap}
.fbar input[type="date"]{padding:.38rem .6rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.85rem}
.fbar input[type="date"]:focus{outline:none;border-color:var(--red)}

/* INVENTORY */
.cat-hrow td{padding:.35rem .5rem}
.cat-lbl{background:var(--yel);color:#5C3A00;font-size:.73rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:.28rem .55rem;border-radius:4px;display:inline-block}
.ls-badge{display:inline-block;background:#FEE2E2;color:#EF4444;border-radius:10px;padding:.08rem .38rem;font-size:.66rem;font-weight:800;margin-left:.3rem}

/* SETTINGS */
.role-badge{display:inline-block;border-radius:20px;padding:.15rem .6rem;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.role-badge.owner{background:#FEF3C7;color:#92400E}
.role-badge.manager{background:#DBEAFE;color:#1E40AF}
.role-badge.staff{background:var(--grey2);color:var(--grey)}
.perm-check{display:flex;align-items:center;gap:.45rem;font-size:.875rem;cursor:pointer;padding:.3rem 0}
.perm-check input[type="checkbox"]{width:16px;height:16px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
.tick-yes{color:var(--grn);font-size:1.05rem}
.tick-no{color:#EF4444;font-size:1.05rem}

/* MODAL */
#umodal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
.modal-box{position:relative;z-index:1;background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:1rem;font-weight:900;margin-bottom:1.1rem}
.modal-close{position:absolute;top:.9rem;right:.9rem;background:none;border:none;font-size:1.3rem;color:var(--grey);cursor:pointer;line-height:1}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:.1rem .5rem}

/* STORAGE INVENTORY GRID */
.stor-wrap{overflow-x:auto;margin:0 -1rem}
.stor-table{border-collapse:collapse;min-width:700px;width:100%;font-size:.82rem}
.stor-table th{background:var(--red);color:#fff;padding:.42rem .55rem;text-align:center;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:2}
.stor-table th.day-col{min-width:90px}
.stor-table td{padding:.28rem .45rem;border:0.5px solid var(--bdr);vertical-align:middle}
.stor-table tr.stor-cat td{background:var(--yel);color:#5C3A00;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:.3rem .55rem}
.stor-table td.stor-name{font-size:.82rem;font-weight:600;white-space:nowrap;min-width:130px}
.stor-table td.stor-uom{font-size:.72rem;color:var(--grey);white-space:nowrap}
.stor-input{width:100%;padding:.22rem .35rem;border:1.5px solid transparent;border-radius:5px;font-size:.83rem;text-align:center;background:transparent;transition:border-color .15s}
.stor-input:focus{outline:none;border-color:var(--red);background:#fff}
.stor-input[readonly]{cursor:default}
.stor-input.zero{color:#EF4444;font-weight:800}
.stor-input.low{color:var(--org);font-weight:700}
.stor-checker{width:100%;padding:.28rem .4rem;border:1.5px solid var(--bdr);border-radius:6px;font-size:.8rem;text-align:center}
.stor-checker:focus{outline:none;border-color:var(--red)}
.week-nav{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.week-label{font-size:.88rem;font-weight:700;min-width:180px;text-align:center}

/* SCHEDULE */
.sched-block{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:.85rem;overflow:hidden}
.sched-block-head{background:var(--red);color:#fff;padding:.45rem .9rem;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.sched-table{width:100%;border-collapse:collapse;font-size:.8rem}
.sched-table th{background:var(--grey2);padding:.38rem .5rem;text-align:center;font-size:.72rem;font-weight:800;color:var(--grey);text-transform:uppercase;border-bottom:1px solid var(--bdr)}
.sched-table td{padding:.3rem .4rem;border:0.5px solid var(--bdr);vertical-align:middle;text-align:center}
.sched-table td.emp-name{text-align:left;font-weight:700;font-size:.82rem;white-space:nowrap;min-width:110px;background:var(--grey2)}
.sched-table td.mall-row{font-size:.72rem;color:#374151;font-weight:600;background:var(--yel-bg)}
.shift-sel{width:100%;padding:.22rem .3rem;border:1px solid var(--bdr);border-radius:5px;font-size:.75rem;background:#fff;cursor:pointer;text-align:center;appearance:none;-webkit-appearance:none}
.shift-sel:focus{outline:none;border-color:var(--red)}
.shift-off{background:#F3F4F6;color:var(--grey);font-size:.75rem;padding:.22rem .3rem;border-radius:5px;font-weight:700;display:block}
.shift-vl{background:#FBEAF0;color:#993556;font-size:.75rem;padding:.22rem .3rem;border-radius:5px;font-weight:700;display:block}
.shift-work{background:var(--grn-bg);color:var(--grn);font-size:.72rem;padding:.2rem .3rem;border-radius:5px;display:block;font-weight:600}
.month-nav{display:flex;align-items:center;gap:.65rem}
.month-label{font-size:.9rem;font-weight:800;min-width:120px;text-align:center}
.ot-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:1.1rem 1.2rem;margin-top:.9rem}
.emp-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;margin-bottom:.85rem}
.emp-sum{background:var(--grey2);border-radius:8px;padding:.65rem .85rem}
.emp-sum .en{font-size:.78rem;font-weight:700;margin-bottom:.35rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-sum .estat{display:flex;gap:.5rem;flex-wrap:wrap}
.estat span{font-size:.72rem;padding:.12rem .45rem;border-radius:10px;font-weight:700}
.es-w{background:var(--grn-bg);color:var(--grn)}.es-o{background:var(--grey2);border:1px solid var(--bdr);color:var(--grey)}
.es-v{background:#FBEAF0;color:#993556}.es-ot{background:var(--yel-bg);color:#6B4400}

/* RESPONSIVE */
@media(max-width:600px){
  .sgrid{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
  .hd-text p{display:none}
  .ni{width:62px}
  .user-chip .uname{display:none}
}

/* PRINT */
@media print{
  body>*{display:none!important}
  #print-area{display:block!important;position:static;padding:1cm;font-size:10pt;font-family:Arial,sans-serif;color:#000}
  .ph{text-align:center;margin-bottom:12px}
  .ph h1{font-size:15pt;font-weight:bold;margin-bottom:2px}
  .ph h2{font-size:11pt;margin-bottom:2px}
  .ph p{font-size:9pt;color:#555}
  .ps{margin-bottom:10px}
  .ps h3{font-size:9pt;font-weight:bold;text-transform:uppercase;border-bottom:1.5px solid #000;padding-bottom:2px;margin-bottom:5px;letter-spacing:.5px}
  .pt{width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:6px}
  .pt th,.pt td{border:1px solid #999;padding:3px 5px}
  .pt th{background:#f0f0f0;font-weight:bold}
  .prow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .prow .pf{border:1px solid #ccc;padding:4px 8px;min-width:110px;border-radius:3px}
  .prow .pf label{display:block;font-size:7.5pt;font-weight:bold;text-transform:uppercase;color:#555}
  .prow .pf span{font-size:11pt;font-weight:bold}
  .psig{display:flex;gap:40px;margin-top:12px;padding-top:8px;border-top:1px solid #ccc}
  .psig div{flex:1}
  .psig label{font-size:8pt;color:#555;font-weight:bold}
  .psig .line{border-bottom:1px solid #000;margin-top:24px;margin-bottom:3px}
}
/* CLOSE DAY MODAL */
.cd-header{background:linear-gradient(135deg,var(--red),#9B0020);color:#fff;padding:1rem 1.15rem;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:space-between}
.cd-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:.3rem .55rem;font-size:.85rem;cursor:pointer}
.cd-body{padding:1rem 1.15rem}
.cd-item{display:flex;align-items:center;gap:.75rem;padding:.75rem .85rem;border-radius:10px;margin-bottom:.55rem;border:1.5px solid}
.cd-item.done{background:#F0FDF4;border-color:#86EFAC}
.cd-item.miss{background:#FEF2F2;border-color:#FCA5A5}
.cd-item.warn{background:#FFFBEB;border-color:#FCD34D}
.cd-check{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.cd-check.y{background:#D1FAE5;color:#065F46}
.cd-check.n{background:#FEE2E2;color:#991B1B}
.cd-item-body{flex:1}
.cd-item-title{font-weight:800;font-size:.9rem;margin-bottom:1px}
.cd-item-sub{font-size:.77rem;color:var(--grey)}
.cd-go{border:1.5px solid var(--red);background:transparent;color:var(--red);border-radius:7px;padding:.28rem .65rem;font-size:.77rem;font-weight:700;cursor:pointer;white-space:nowrap}
.cd-go:hover{background:var(--red-bg)}
.cd-summary{background:var(--grey2);border-radius:10px;padding:.75rem .9rem;margin:.65rem 0}
.cd-sum-row{display:flex;justify-content:space-between;font-size:.84rem;padding:.18rem 0}
.cd-sum-row.total{font-weight:800;font-size:.9rem;border-top:1px solid var(--bdr);margin-top:.35rem;padding-top:.45rem}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo-wrap">
      <div class="logo-icon">🍟</div>

// Write to localStorage AND Firestore simultaneously
function lsSet(key,val){
  localStorage.setItem(key,val);
  _pendingWrites++;
  updateSyncBadge();
  _DB.collection(_COL).doc(key).set({v:val,t:Date.now()})
    .then(()=>{_pendingWrites=Math.max(0,_pendingWrites-1);updateSyncBadge();})
    .catch(e=>{console.warn('Firebase write error:',key,e);/* stays pending */updateSyncBadge();});
}
function updateSyncBadge(){
  var badge=document.getElementById('sync-badge');
  var btn=document.getElementById('logout-btn');
  if(!badge||!btn)return;
  if(_pendingWrites>0){
    badge.style.display='inline-flex';
    badge.textContent=_pendingWrites;
    btn.title=_pendingWrites+' change'+(+_pendingWrites!==1?'s':'')+' not yet synced to cloud — sync before logging out';
  }else{
    badge.style.display='none';
    btn.title='';
  }
}

// Pull Firestore data into localStorage.
// First login (or manual refresh): full fetch.
// Subsequent logins: only fetch docs changed since _lastSync (incremental).
async function syncFromCloud(force){
  try{
    let query=_DB.collection(_COL);
    if(!force&&_lastSync>0){
      // Option 2: incremental — only docs written/updated after last sync
      query=query.where('t','>',_lastSync);
    }
    const snap=await query.get();
    snap.forEach(doc=>{
      if(doc.data()&&doc.data().v!==undefined)localStorage.setItem(doc.id,doc.data().v);
    });
    _lastSync=Date.now();
    return snap.size;
  }catch(e){
    console.warn('Cloud sync failed, using local data:',e);
    return 0;
  }
}

// ── REAL-TIME LIVE SYNC (onSnapshot) ─────────────────────────
let _liveUnsub=null;
const LIVE_TABS=['dashboard','revdash','stockdash'];
function startLiveSync(){
  if(_liveUnsub)return;
  try{
    _liveUnsub=_DB.collection(_COL).onSnapshot(function(snap){
      var changed=false;
      snap.docChanges().forEach(function(ch){
        if((ch.type==='modified'||ch.type==='added')&&ch.doc.data()&&ch.doc.data().v!==undefined){
          localStorage.setItem(ch.doc.id,ch.doc.data().v);
          changed=true;
        }
      });
      if(changed&&LIVE_TABS.includes(ST.tab)){
        if(ST.tab==='dashboard')renderDash();
        else if(ST.tab==='revdash')renderRevenueDash();
        else if(ST.tab==='stockdash')renderStockDash();
      }
      var ind=document.getElementById('live-ind');
      if(ind){ind.style.background='#22c55e';setTimeout(function(){ind.style.background='rgba(34,197,94,.5)';},800);}
    },function(err){
      console.warn('Live sync error:',err);stopLiveSync();
    });
    var ind=document.getElementById('live-ind');if(ind)ind.style.display='inline-block';
  }catch(e){console.warn('Could not start live sync:',e);}
}
function stopLiveSync(){
  if(_liveUnsub){_liveUnsub();_liveUnsub=null;}

function checkAndSendAlerts(){
  var s=loadAlertSettings();

  var t=today();
  var sales=loadSales(t);var inv=loadInv(t);var pl=loadPL(t);
  var c=sales?computeSales(sales):null;
  var vth=loadVarThreshold();
  var lines=[];
  if(s.alertMissingSales&&!sales)lines.push('❌ Daily Sales report NOT submitted');
  if(s.alertMissingInv&&!inv)lines.push('❌ Inventory report NOT submitted');
  if(s.alertMissingPL&&!pl)lines.push('❌ P&L report NOT submitted');
  if(s.alertVariance&&c&&Math.abs(c.variance)>vth)lines.push('⚠️ Cash variance ₱'+Math.abs(c.variance).toFixed(2)+' exceeds threshold');

  var branch=ST.branch;

function getMonthCloseChecklist(ym){
  var pfx='nyfd_pl_'+ST.branch.replace(/\s+/g,'_')+'_';
  var plKeys=Object.keys(localStorage).filter(function(k){return k.startsWith(pfx)&&k.replace(pfx,'').startsWith(ym);});
  var salesPfx='nyfd_sales_'+ST.branch.replace(/\s+/g,'_')+'_';
  var salesKeys=Object.keys(localStorage).filter(function(k){return k.startsWith(salesPfx)&&k.replace(salesPfx,'').startsWith(ym);});
  var daysInMonth=new Date(parseInt(ym.slice(0,4)),parseInt(ym.slice(5,7)),0).getDate();
  var plDays=plKeys.length;
  var salesDays=salesKeys.length;
  // Pending expenses for the month
  var pendingExp=0;
  salesKeys.forEach(function(k){
    var d=k.replace(salesPfx,'');
    loadExp(d).forEach(function(e){if(e.status==='pending')pendingExp++;});
  });
  // Pending restocks for the month
  var pendingRk=0;
  salesKeys.forEach(function(k){
    var d=k.replace(salesPfx,'');
    loadRestocks(d).forEach(function(e){if(e.status==='pending')pendingRk++;});
  });
  // P&L records still needing COGS
  var missingCOGS=plKeys.filter(function(k){var pd=JSON.parse(localStorage.getItem(k)||'null');return pd&&pd.needsCOGS;}).length;
  // Financials
  var gross=0,net=0;
  plKeys.forEach(function(k){
    var pd=JSON.parse(localStorage.getItem(k)||'null');if(!pd)return;
    var d=k.replace(pfx,'');var sr=loadSales(d);if(sr)gross+=computeSales(sr).gross;
    if(typeof pd.netProfit==='number')net+=pd.netProfit;
  });
  return{plDays:plDays,salesDays:salesDays,daysInMonth:daysInMonth,pendingExp:pendingExp,pendingRk:pendingRk,missingCOGS:missingCOGS,gross:gross,net:net};
}

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const pw=document.getElementById('lp').value;
  const err=document.getElementById('lerr');
  const btn=document.getElementById('login-btn');
  if(!u||!pw){err.textContent='Enter username and password.';err.style.display='block';return;}
  const email=u.toLowerCase()+AUTH_EMAIL_DOMAIN;
  const oldLabel=btn?btn.textContent:'SIGN IN';
  if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  // Firebase Auth is the real gate — only valid accounts can sign in and reach cloud data.
  _AUTH.signInWithEmailAndPassword(email,pw).then(function(){
    err.style.display='none';
    if(btn){btn.disabled=false;btn.textContent=oldLabel;}
    // enterApp() runs from onAuthStateChanged below
  }).catch(function(e){
    if(btn){btn.disabled=false;btn.textContent=oldLabel;}
    var msg='Incorrect username or password.';
    if(e&&e.code==='auth/network-request-failed')msg='No internet — you must be online to sign in the first time on this device.';
    else if(e&&e.code==='auth/too-many-requests')msg='Too many attempts — please wait a minute and try again.';
    err.textContent=msg;err.style.display='block';
    console.warn('Login failed:',e&&e.code);
  });
}
// Show app UI for a given user record (called from cache restore and enterApp).

// Build the in-app session for an authenticated Firebase user.
function enterApp(fbUser){
  const uname=(fbUser.email||'').split('@')[0];
  _saveSession(uname);
  const users=loadUsers();
  let rec=users.find(function(x){return (x.username||'').toLowerCase()===uname.toLowerCase();});
  if(!rec)rec={username:uname,name:uname.charAt(0).toUpperCase()+uname.slice(1),role:'staff',perms:{sales:true,inventory:true}};
  try{document.getElementById('lerr').style.display='none';}catch(e){}

      else if(ST.tab==='revdash')renderRevenueDash();

// On page load: immediately restore session from localStorage so refresh never shows login screen.
(function(){

  var users=loadUsers();
  var rec=users.find(function(x){return (x.username||'').toLowerCase()===saved.toLowerCase();});

  try{document.getElementById('app').style.display='block';}catch(e){}

})();
// Firebase Auth verifies in background — confirms the cached session or handles explicit sign-out.
_AUTH.onAuthStateChanged(function(fbUser){
  if(fbUser){
    try{enterApp(fbUser);}catch(e){console.error('enterApp error:',e);}
  } else {
    // Firebase has no active session. Two cases:
    // 1. No cache either (fresh visit or after explicit logout) → show login form.
    // 2. Cache exists (user refreshed page, Firebase failed to restore its IndexedDB) → stay in app.
    //    localStorage is our source of truth; Firebase is used for cloud sync only.
    if(!ST.user){
      var ll=document.getElementById('login-loading'); if(ll)ll.style.display='none';
      var lf=document.getElementById('login-form'); if(lf)lf.style.display='';
      var ls=document.getElementById('login-screen'); if(ls)ls.style.display='flex';
      var ap=document.getElementById('app'); if(ap)ap.style.display='none';
    }
    // If ST.user is already set from the cache restore above, do nothing — keep the app open.
  }
});

// One-time migration: push every local record on this device up to the cloud,
// so data created before cloud sync was enabled appears on other devices.
function uploadAllLocalToCloud(){
  if(!ST.user||ST.user.role!=='owner'){showToast('Owner only');return;}
  if(!_AUTH||!_AUTH.currentUser){showToast('⚠️ Not signed in to cloud — cannot upload');return;}
  var keys=Object.keys(localStorage).filter(function(k){return k.indexOf('nyfd_')===0;});
  if(!keys.length){showToast('No local data to upload');return;}
  if(!confirm('Upload ALL '+keys.length+' data records on THIS device to the cloud?\n\nDo this on the device that has your most complete and recent data. It overwrites the cloud copy of any matching records.'))return;
  var st=document.getElementById('backfill-status');
  var done=0,fail=0;
  function tick(){if(st)st.textContent='Uploaded '+done+' of '+keys.length+(fail?(' · '+fail+' failed'):'')+(done+fail>=keys.length?' ✓ Done':'…');}
  if(st)st.textContent='Uploading '+keys.length+' records…';
  showToast('⬆️ Uploading '+keys.length+' records to cloud…');
  keys.forEach(function(k){
    _DB.collection(_COL).doc(k).set({v:localStorage.getItem(k),t:Date.now()})
      .then(function(){done++;tick();})
      .catch(function(){fail++;tick();});
  });
}

// ── TABS ──────────────────────────────────────────────────────
function _checkDateChange(){
  if(!ST.user||ST.user.role==='owner')return;
  const todayStr=today();
  const lsKey='nyfd_last_seen_date_'+(ST.user.username||'');
  const lastSeen=localStorage.getItem(lsKey);
  localStorage.setItem(lsKey,todayStr);
  if(!lastSeen||lastSeen===todayStr)return;
  // Date changed — check if previous day's reports are missing
  const prevMissing=!loadSales(lastSeen)||!loadInv(lastSeen)||!loadPL(lastSeen);
  if(!prevMissing)return;
  // Only prompt once per session per missed date
  const flagKey='nyfd_closeprompt_'+(ST.user.username||'')+'_'+lastSeen;
  if(localStorage.getItem(flagKey))return;
  localStorage.setItem(flagKey,'1');
  // Show the missed-day banner via a toast + modal
  setTimeout(function(){
    document.getElementById('umodal-body').innerHTML=
      '<div style="text-align:center;padding:.5rem 0">'
      +'<div style="font-size:2.2rem;margin-bottom:.4rem">📋</div>'
      +'<div style="font-weight:900;font-size:1rem;margin-bottom:.35rem;color:#B91C1C">Incomplete report detected for '+lastSeen+'</div>'
      +'<p style="font-size:.85rem;color:#374151;line-height:1.6;margin-bottom:1rem">Yesterday\'s day was not fully closed.<br>Please complete the missing submissions before starting today.</p>'
      +'<div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap">'
      +'<button onclick="closeModal();openCloseDay(\''+lastSeen+'\');" style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:.6rem 1.2rem;font-size:.88rem;font-weight:800;cursor:pointer">📋 Complete Yesterday</button>'
      +'<button onclick="closeModal()" style="background:var(--grey2);color:#374151;border:none;border-radius:8px;padding:.6rem 1.2rem;font-size:.88rem;font-weight:700;cursor:pointer">Dismiss</button>'
      +'</div></div>';
    document.getElementById('umodal').style.display='flex';
  },400);
}

function goTab(t){
  ST.tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tp').forEach(p=>p.classList.toggle('active',p.id===`tp-${t}`));
  _checkDateChange();
  // Start live sync on dashboard tabs, stop on others
  if(ST.user&&ST.user.role==='owner'){
    if(LIVE_TABS.includes(t)){startLiveSync();}else{stopLiveSync();}
  }
  if(t==='dashboard')renderDash();
  else if(t==='revdash')renderRevenueDash();
  else if(t==='stockdash')renderStockDash();
  else if(t==='empdash')renderEmployeeDash();
  else if(t==='sales')renderSales(today());
  else if(t==='inventory')renderInv(today());
  else if(t==='history')renderHistory();
  else if(t==='pnl')renderPL(today());
  else if(t==='storage')renderStorage(ST.storWeek);
  else if(t==='schedule')renderSchedule(ST.schedMonth);
  else if(t==='settings')renderSettings();
}

// ── COMPUTE SALES ─────────────────────────────────────────────
function computeSales(d){
  // Gross = sum of order amounts
  let gross=ORDER_ITEMS.reduce((s,it)=>s+parseN(d.orders?.[it]?.amt),0);
  // Cash
  let totalCash=DENOMS.reduce((s,dn)=>s+parseN(d.cash?.[dn])*dn,0);
  // Opening float (cash at start of day — excluded from today's collection)
  let openingFloat=parseN(d.openingFloat);
  let actualCash=totalCash-openingFloat; // cash actually collected today
  // Online
  let creditSales=PLATFORMS.reduce((s,pl)=>s+parseN(d.online?.[pl]?.amt),0);
  // Discounts
  let scAmt=parseN(d.disc?.SC?.amt);
  let pwdAmt=parseN(d.disc?.PWD?.amt);
  let grandDisc=scAmt+pwdAmt;
  // Derived
  let netSales=gross-grandDisc;
  let totalSales=actualCash+creditSales;
  let variance=totalSales-netSales; // + = over, - = short
  // Fund breakdowns
  let cfCash=DENOMS.reduce((s,dn)=>s+parseN(d.cfBreak?.[dn])*dn,0);
  let rfCash=DENOMS.reduce((s,dn)=>s+parseN(d.rfBreak?.[dn])*dn,0);
  return{gross,totalCash,openingFloat,actualCash,creditSales,grandDisc,netSales,totalSales,variance,cfCash,rfCash};
}

function recompute(){
  // Gather data from DOM
  const d=getSalesFormData();
  const c=computeSales(d);

  // Update order totals
  let tq=0,ta=0;
  ORDER_ITEMS.forEach(it=>{
    const qEl=document.getElementById(`oq-${slug(it)}`);
    const aEl=document.getElementById(`oa-${slug(it)}`);
    const q=parseN(qEl?.value);
    const fp=parseN(qEl?.dataset?.price);
    if(fp&&aEl){const ca=q*fp;aEl.value=ca?ca.toFixed(2):'';ta+=ca;}
    else{ta+=parseN(aEl?.value);}
    tq+=q;
  });
  setText('s-totqty',tq||'');
  setText('s-gross',ta?fmtPHP(ta):'');

  // Cash totals
  DENOMS.forEach(dn=>{
    const q=parseN(document.getElementById(`cd-${slug(''+dn)}`)?.value);
    setText(`ct-${slug(''+dn)}`,q?fmtPHP(q*dn):'');
  });
  setText('s-tcash',fmtPHP(c.totalCash));

  // Online totals
  setMasked('s-credit','online',fmtPHP(c.creditSales));

  // Disc total
  setText('s-disc',fmtPHP(c.grandDisc));

  // Computed section
  setMasked('sc-gross','gross',fmtPHP(c.gross));
  setText('sc-disc',fmtPHP(c.grandDisc));
  setMasked('sc-net','netSales',fmtPHP(c.netSales));
  setText('sc-cash',fmtPHP(c.totalCash));
  setText('sc-opening-float',c.openingFloat>0?'- '+fmtPHP(c.openingFloat):'₱0.00');
  setText('sc-actual-cash',fmtPHP(c.actualCash));
  setMasked('sc-credit','online',fmtPHP(c.creditSales));
  setText('sc-total',fmtPHP(c.totalSales));

  const varEl=document.getElementById('sc-var');
  const varWrap=document.getElementById('sc-var-wrap');
  if(varEl){
    if(canSee('variance')){varEl.textContent=fmtPHP(c.variance);}
    else{varEl.innerHTML='<span style="color:#9CA3AF;letter-spacing:3px">●●●</span>';}
    if(varWrap)varWrap.className='cfield big '+(c.variance<0?'neg':'pos');
  }
  // Show/hide variance remark field
  const vrWrap=document.getElementById('var-rmk-wrap');
  if(vrWrap){
    const show=c.variance!==0&&!document.getElementById('s-var-rmk')?.readOnly;
    vrWrap.style.display=show?'':'none';
    vrWrap.style.borderColor=c.variance<0?'#FCA5A5':'#FCD34D';
    vrWrap.style.background=c.variance<0?'#FEF2F2':'#FFFBEB';
    const lbl=vrWrap.querySelector('label');
    if(lbl)lbl.style.color=c.variance<0?'#991B1B':'#92400E';
  }

  // ATV
  const custVal=parseN(document.getElementById('s-cust')?.value);
  const atvEl=document.getElementById('sc-atv');
  if(atvEl)atvEl.textContent=custVal>0?fmtPHP(c.netSales/custVal):'—';

  // CF/RF breakdowns
  DENOMS.forEach(dn=>{
    const cfQ=parseN(document.getElementById(`cf-${slug(''+dn)}`)?.value);
    setText(`cft-${slug(''+dn)}`,cfQ?fmtPHP(cfQ*dn):'');
    const rfQ=parseN(document.getElementById(`rf-${slug(''+dn)}`)?.value);
    setText(`rft-${slug(''+dn)}`,rfQ?fmtPHP(rfQ*dn):'');
  });
  setText('sc-cf-total',fmtPHP(c.cfCash));
  setText('sc-rf-total',fmtPHP(c.rfCash));
}

function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val}
function autoFillAmt(idx){
  const it=ORDER_ITEMS[idx];if(!it)return;
  const prices=loadItemPrices();
  const p=parseN(prices[it]);if(!p)return;
  const qEl=document.getElementById('oq-'+slug(it));
  const aEl=document.getElementById('oa-'+slug(it));
  if(qEl&&aEl){const qty=parseN(qEl.value);aEl.value=qty?(qty*p).toFixed(2):'';}
}

function getSalesFormData(){
  const orders={};
  ORDER_ITEMS.forEach(it=>{
    const qEl=document.getElementById(`oq-${slug(it)}`);
    const q=qEl?.value||'';
    const fp=parseN(qEl?.dataset?.price);
    const amt=fp&&q?(parseN(q)*fp).toFixed(2):(document.getElementById(`oa-${slug(it)}`)?.value||'');
    orders[it]={qty:q,amt:amt};
  });
  const cash={};
  DENOMS.forEach(dn=>cash[dn]=document.getElementById(`cd-${slug(''+dn)}`)?.value||'');
  const online={};
  PLATFORMS.forEach(pl=>{
    online[pl]={

// Auto-compute and save P&L from available data — fires silently after Sales save.
// Saves everything it can determine; marks needsCOGS=true when COGS is unknown.
function autoSavePL(date){
  var sales=loadSales(date);
  if(!sales)return; // nothing to compute without sales
  var existing=loadPL(date);
  // Don't overwrite a manually-saved P&L that already has COGS entered by staff
  if(existing&&!existing.autoSaved)return;

  var salesComp=computeSales(sales);
  var gross=salesComp.gross;

  // Fixed costs from settings
  var fc=loadFC();
  var fcOverrides={};Object.keys(DEF_FC).forEach(function(k){fcOverrides[k]=fc[k];});
  var fcTotal=Object.values(fc).reduce(function(s,v){return s+v;},0);

  // Labor from schedule + rates
  var sched=loadSchedule(date.slice(0,7));
  var rates=loadRates();
  var emps=loadEmps();
  var staffOnDuty=emps.filter(function(e){var s=(sched[e]&&sched[e][date])||'';return s&&s!=='OFF'&&s!=='VL';});
  var laborTotal=staffOnDuty.reduce(function(s,e){return s+parseN(rates[e]||658);},0);

  // OT from log
  var otLog=loadOT();
  var dayOT=otLog.filter(function(e){return e.date===date;});
  var otCost=dayOT.reduce(function(s,e){var dr=parseN(rates[e.emp]||'');return s+(dr>0?parseN(e.hours)*dr/8:0);},0);

  // Expense log total
  var _apprPL=loadApprovalSettings();
  var expLogTotal=loadExp(date).reduce(function(s,e){
    if(_apprPL.requireExpenseApproval&&(e.status==='rejected'||e.status==='pending'))return s;
    return s+parseN(e.amt);
  },0);

  // Restock total
  var rkLogTotal=loadRestocks(date).reduce(function(s,e){
    if(_apprPL.requireRestockApproval&&(e.status==='rejected'||e.status==='pending'))return s;
    return s+parseN(e.totalCost);
  },0);

  // COGS — use existing saved COGS, or today's restock total, or leave as 0 with flag
  var cogsMode=existing&&existing.cogsMode||'total';
  var cogsTotal=0;
  var needsCOGS=false;
  if(existing&&(existing.cogsTotal||existing.cogsItems)){
    // Preserve staff-entered COGS
    cogsMode=existing.cogsMode||'total';
    cogsTotal=parseN(existing.cogsTotal||0);
  } else if(rkLogTotal>0){
    cogsTotal=rkLogTotal; // use restock purchases as COGS proxy
  } else {
    needsCOGS=true; // staff still needs to enter this
  }

  var totalExp=fcTotal+laborTotal+otCost+expLogTotal; // rkLogTotal always captured via cogsTotal — never add it twice
  var netProfit=gross-totalExp-cogsTotal;

  var now=new Date().toISOString();
  var data=Object.assign({},existing||{},{
    autoSaved:true,
    needsCOGS:needsCOGS,
    fixedOverrides:fcOverrides,
    laborOverride:String(laborTotal),
    otOverride:String(otCost.toFixed(2)),
    holiday:existing&&existing.holiday||'',
    cogsMode:cogsMode,
    cogsTotal:String(cogsTotal),
    cogsItems:existing&&existing.cogsItems||{},
    cogsMisc:existing&&existing.cogsMisc||'',
    otherExpenses:existing&&existing.otherExpenses||[],
    expLogTotal:expLogTotal,
    rkLogTotal:rkLogTotal,
    netProfit:netProfit,
    last_edited_at:now,
    last_edited_by:'Auto',
  });
  if(!data.submitted_at){data.submitted_at=now;data.submitted_by=ST.user&&ST.user.name||'Auto';}
  savePLData(date,data);
  if(needsCOGS)showToast('📊 P&L auto-saved — enter COGS in P&L tab to complete');
}

function updateInvRow(itemName,catIdx){
  const op=parseN(document.getElementById(`iv-op-${slug(itemName)}`)?.value);

  const wstEl=document.getElementById(`iv-wst-${slug(itemName)}`);

  const wst=wstEl&&wstEl.value!==''?parseN(wstEl.value):0;
  const usedEl=document.getElementById(`iv-used-${slug(itemName)}`);
  const remEl=document.getElementById(`iv-rem-${slug(itemName)}`);
  if(usedEl) usedEl.textContent=cl!==null?Math.max(0,op-cl-wst):'';
  if(remEl){
    remEl.textContent=cl!==null?cl:'';
    const ls=cl!==null&&cl<=2;
    remEl.style.color=ls?'var(--org)':'';
    remEl.style.fontWeight=ls?'900':'';
  }
  if(catIdx!==undefined){
    const cat=INV_CATS[catIdx];
    if(cat){
      const total=cat.items.reduce((s,it)=>{
        const el=document.getElementById(`iv-wst-${slug(it.n)}`);
        return s+parseN(el?.value||'');
      },0);
      const totalEl=document.getElementById(`iv-wst-total-${catIdx}`);
      if(totalEl)totalEl.textContent=total||'—';
    }
  }
}

function getLowStockItems(invData){
  if(!invData)return[];
  const ls=[];
  ALL_INV_ITEMS.forEach(n=>{
    const cl=invData.items?.[n]?.cl;
    if(cl!==''&&cl!==undefined){
      const rem=parseN(cl);
      if(rem<=2)ls.push({name:n,rem});
    }
  });
  return ls;
}

      var exps=loadExp(d).filter(function(e){return e.status!=='rejected';});
      var rks=loadRestocks(d).filter(function(e){return e.status!=='rejected';});
      var c=s?computeSales(s):{gross:0,netSales:0,variance:0,creditSales:0};
      var expT=exps.reduce(function(s,e){return s+parseN(e.amt);},0);
      var rkT=rks.reduce(function(s,e){return s+parseN(e.totalCost);},0);
      wGross+=c.gross;wNet+=c.netSales;wVar+=c.variance;wCust+=s?parseN(s.custCount):0;
      wExpTotal+=expT;wRkTotal+=rkT;
      if(p&&typeof p.netProfit==='number'){wNetProfit+=p.netProfit;wHasPL=true;}
      if(s&&s.ceoNote&&s.ceoNote.trim())ceoNotes.push({date:d,note:s.ceoNote.trim(),by:s.submitted_by||'Staff'});
      days.push({date:d,sales:s,pl:p,inv:inv,c:c,expT:expT,rkT:rkT,hasSales:!!s,hasInv:!!inv,hasPL:!!p});
    });
    // Compliance score (submitted days / 7)
    var compDone=days.filter(function(d){return d.hasSales&&d.hasInv&&d.hasPL;}).length;
    // Low stock
    var latestInvDay=days.slice().reverse().find(function(d){return d.inv;});
    var lowItems=getLowStockItems(latestInvDay?latestInvDay.inv:null);
    // Attendance absences this week
    var absences=[];
    bEmps.forEach(function(emp){
      var empAtt=bAtt[emp]||{};
      weekDates.forEach(function(d){
        var shift=(bSched[emp]&&bSched[emp][d])||'';
        if(shift&&shift!=='OFF'&&shift!=='VL'&&empAtt[d]==='A')absences.push({emp:emp,date:d});
      });
    });
    // ATV
    var wAtv=wCust>0?wNet/wCust:null;
    // Margin
    var wMargin=wGross>0&&wHasPL?(wNetProfit/wGross*100):null;
    brData.push({br:br,days:days,wGross:wGross,wNet:wNet,wVar:wVar,wCust:wCust,wAtv:wAtv,
      wExpTotal:wExpTotal,wRkTotal:wRkTotal,wNetProfit:wNetProfit,wHasPL:wHasPL,wMargin:wMargin,
      compDone:compDone,lowItems:lowItems,absences:absences,ceoNotes:ceoNotes,emps:bEmps,sched:bSched});
  });
  ST.branch=prevBr;

  // ── Combined totals ──────────────────────────────────────────
  var totGross=brData.reduce(function(s,b){return s+b.wGross;},0);
  var totNet=brData.reduce(function(s,b){return s+b.wNet;},0);

  var totVar=brData.reduce(function(s,b){return s+b.wVar;},0);
  var totCust=brData.reduce(function(s,b){return s+b.wCust;},0);
  var totAtv=totCust>0?totNet/totCust:null;
  var totMargin=totGross>0?(totNetProfit/totGross*100):null;
  var totLowCount=brData.reduce(function(s,b){return s+b.lowItems.length;},0);
  var totAbsences=brData.reduce(function(s,b){return s+b.absences.length;},0);

  // ── Build HTML ───────────────────────────────────────────────

    +'.r{text-align:right}.hl{font-weight:900}.pos{color:#065F46}.neg{color:#991B1B}'
    +'.hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #DC2626;padding-bottom:.65rem;margin-bottom:.85rem}'

    +'.br-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}'
    +'.br-name{font-size:1.05rem;font-weight:900;color:#1F2937}.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.6rem}'
    +'.kpi{background:#F9FAFB;border-radius:6px;padding:8px 12px;min-width:100px}'
    +'.kpi-label{font-size:.68rem;color:#6B7280;font-weight:700;text-transform:uppercase;letter-spacing:.04em}'
    +'.kpi-val{font-size:1.1rem;font-weight:900;margin-top:2px}'
    +'.pill{display:inline-block;border-radius:12px;padding:.1rem .5rem;font-size:.72rem;font-weight:800;margin:.1rem}'
    +'.pill-g{background:#D1FAE5;color:#065F46}.pill-r{background:#FEE2E2;color:#991B1B}.pill-y{background:#FEF3C7;color:#92400E}'

    +'.ftr{text-align:center;font-size:.72rem;color:#9CA3AF;margin-top:1.4rem;border-top:1px solid #E5E7EB;padding-top:.6rem}'
    +'tr:nth-child(even){background:#F9FAFB}@media print{body{padding:8px}button{display:none!important}.br-block{page-break-inside:avoid}}';

  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>NYFD Weekly Report — '+weekStart+' to '+weekEnd+'</title><style>'+css+'</style></head><body>';

  // Header
  html+='<div class="hdr">'
    +'<div><div class="logo">🍟 NYFD</div><div style="font-size:.85rem;color:#374151;font-weight:700;margin-top:2px">NEW YORK FRIES &amp; DIPS</div></div>'
    +'<div style="text-align:right"><div style="font-size:1rem;font-weight:900">📊 Weekly Summary Report</div>'
    +'<div style="font-size:.82rem;color:#6B7280">'+fmtDate(weekStart)+' — '+fmtDate(weekEnd)+'</div>'
    +'<div style="font-size:.75rem;color:#9CA3AF">All Branches &nbsp;·&nbsp; '+branches.length+' location'+(branches.length!==1?'s':'')+'</div>'

  // ── Combined Executive Summary ────────────────────────────────
  html+='<h2>📈 Combined Weekly Performance — All Branches</h2>'

    +'<div class="kpi"><div class="kpi-label">Total Gross Revenue</div><div class="kpi-val pos">'+fmtPHP(totGross)+'</div></div>'

    +(totNetProfit||totNetProfit===0?'<div class="kpi"><div class="kpi-label">Combined Net Profit</div><div class="kpi-val '+(totNetProfit>=0?'pos':'neg')+'">'+fmtPHP(totNetProfit)+'</div></div>':'')
    +(totMargin!==null?'<div class="kpi"><div class="kpi-label">Avg Margin %</div><div class="kpi-val '+(totMargin>=15?'pos':totMargin>=8?'':'neg')+'">'+totMargin.toFixed(1)+'%</div></div>':'')
    +'<div class="kpi"><div class="kpi-label">Cash Variance</div><div class="kpi-val '+(totVar<0?'neg':totVar>0?'pos':'')+'">'+fmtPHP(totVar)+'</div></div>'
    +(totAtv!==null?'<div class="kpi"><div class="kpi-label">Avg Transaction Value</div><div class="kpi-val">'+fmtPHP(totAtv)+'</div></div>':'')
    +'<div class="kpi"><div class="kpi-label">Total Customers</div><div class="kpi-val">'+totCust.toLocaleString()+'</div></div>'
    +'</div>';

  // ── Branch Ranking Table ──────────────────────────────────────
  var ranked=brData.slice().sort(function(a,b){
    if(a.wMargin===null&&b.wMargin===null)return b.wGross-a.wGross;
    if(a.wMargin===null)return 1;if(b.wMargin===null)return -1;
    return b.wMargin-a.wMargin;
  });
  html+='<h2>🏆 Branch Ranking — This Week</h2>'
    +'<table><thead><tr><th>#</th><th>Branch</th><th class="r">Gross</th><th class="r">Net Profit</th><th class="r">Margin</th><th class="r">Compliance</th><th class="r">Low Stock</th><th class="r">Absences</th></tr></thead><tbody>';
  ranked.forEach(function(b,i){
    var medals=['🥇','🥈','🥉'];
    var mColor=b.wMargin===null?'#6B7280':b.wMargin>=20?'#065F46':b.wMargin>=10?'#D97706':'#991B1B';
    html+='<tr>'
      +'<td style="font-weight:900">'+(medals[i]||i+1)+'</td>'
      +'<td style="font-weight:700">'+esc(b.br)+'</td>'
      +'<td class="r hl pos">'+fmtPHP(b.wGross)+'</td>'
      +'<td class="r hl '+(b.wHasPL?(b.wNetProfit>=0?'pos':'neg'):'')+'">'+( b.wHasPL?fmtPHP(b.wNetProfit):'—')+'</td>'
      +'<td class="r hl" style="color:'+mColor+'">'+( b.wMargin!==null?b.wMargin.toFixed(1)+'%':'—')+'</td>'
      +'<td class="r">'+b.compDone+'/7 days</td>'
      +'<td class="r '+(b.lowItems.length?'neg':'')+'">'+( b.lowItems.length||'✓')+'</td>'
      +'<td class="r '+(b.absences.length>=2?'neg':'')+'">'+( b.absences.length||'✓')+'</td>'
      +'</tr>';
  });
  html+='<tr style="background:#FFF8E1;font-weight:900"><td colspan="2">COMBINED</td>'
    +'<td class="r">'+fmtPHP(totGross)+'</td>'
    +'<td class="r '+(totNetProfit>=0?'pos':'neg')+'">'+fmtPHP(totNetProfit)+'</td>'
    +'<td class="r">'+(totMargin!==null?totMargin.toFixed(1)+'%':'—')+'</td>'
    +'<td class="r">—</td><td class="r '+(totLowCount?'neg':'')+'">'+(totLowCount||'✓')+'</td>'
    +'<td class="r '+(totAbsences>=2?'neg':'')+'">'+(totAbsences||'✓')+'</td>'
    +'</tr></tbody></table>';

  // ── Per-branch detail sections ────────────────────────────────
  html+='<h2 style="margin-top:1.5rem">📋 Branch Details</h2>';
  brData.forEach(function(b){
    var marginColor=b.wMargin===null?'#6B7280':b.wMargin>=20?'#065F46':b.wMargin>=10?'#D97706':'#991B1B';
    html+='<div class="br-block">';
    html+='<div class="br-head"><div class="br-name">🏪 '+esc(b.br)+'</div>'
      +'<div>'
      +(b.lowItems.length?'<span class="pill pill-r">📦 '+b.lowItems.length+' low stock</span>':'<span class="pill pill-g">📦 Stock OK</span>')
      +(b.absences.length>=2?'<span class="pill pill-r">👥 '+b.absences.length+' absence'+(b.absences.length!==1?'s':'')+'</span>':b.absences.length===1?'<span class="pill pill-y">👥 1 absence</span>':'<span class="pill pill-g">👥 Attendance OK</span>')
      +'</div></div>';

    // Weekly KPIs
    html+='<div class="kpi-row">'
      +'<div class="kpi"><div class="kpi-label">Gross Revenue</div><div class="kpi-val pos">'+fmtPHP(b.wGross)+'</div></div>'

      +(b.wHasPL?'<div class="kpi"><div class="kpi-label">Net Profit</div><div class="kpi-val '+(b.wNetProfit>=0?'pos':'neg')+'">'+fmtPHP(b.wNetProfit)+'</div></div>':'')
      +(b.wMargin!==null?'<div class="kpi"><div class="kpi-label">Margin %</div><div class="kpi-val" style="color:'+marginColor+'">'+b.wMargin.toFixed(1)+'%</div></div>':'')
      +(b.wAtv!==null?'<div class="kpi"><div class="kpi-label">Avg Transaction</div><div class="kpi-val">'+fmtPHP(b.wAtv)+'</div></div>':'')
      +'<div class="kpi"><div class="kpi-label">Cash Variance</div><div class="kpi-val '+(b.wVar<0?'neg':b.wVar>0?'pos':'')+'">'+fmtPHP(b.wVar)+'</div></div>'
      +(b.wExpTotal+b.wRkTotal>0?'<div class="kpi"><div class="kpi-label">Total Expenses</div><div class="kpi-val neg">'+fmtPHP(b.wExpTotal+b.wRkTotal)+'</div></div>':'')
      +'</div>';

    // Daily compliance
    html+='<table><thead><tr><th>Date</th><th>Sales</th><th>Inventory</th><th>P&amp;L</th><th class="r">Gross</th><th class="r">Variance</th></tr></thead><tbody>';
    b.days.forEach(function(d){
      var vth=loadVarThreshold();
      html+='<tr>'
        +'<td>'+fmtDate(d.date)+'</td>'
        +'<td>'+(d.hasSales?'<span style="color:#065F46;font-weight:700">✓</span>':'<span style="color:#991B1B">✗</span>')+'</td>'
        +'<td>'+(d.hasInv?'<span style="color:#065F46;font-weight:700">✓</span>':'<span style="color:#991B1B">✗</span>')+'</td>'
        +'<td>'+(d.hasPL?'<span style="color:#065F46;font-weight:700">✓</span>':'<span style="color:#991B1B">✗</span>')+'</td>'
        +'<td class="r">'+(d.c.gross>0?fmtPHP(d.c.gross):'—')+'</td>'
        +'<td class="r '+(Math.abs(d.c.variance)>vth?'neg':'')+'">'+( d.hasSales?fmtPHP(d.c.variance):'—')+'</td>'
        +'</tr>';
    });
    html+='<tr style="background:#FFF8E1;font-weight:900"><td>WEEK TOTAL</td><td colspan="3"></td><td class="r pos">'+fmtPHP(b.wGross)+'</td><td class="r '+(b.wVar<0?'neg':b.wVar>0?'pos':'')+'">'+fmtPHP(b.wVar)+'</td></tr>';
    html+='</tbody></table>';

    // Low stock
    if(b.lowItems.length){
      html+='<div style="margin-top:.5rem"><strong style="font-size:.8rem;color:#991B1B">⚠ Low Stock:</strong> '
        +b.lowItems.map(function(i){return'<span class="pill pill-r">'+esc(i.name)+' ('+i.rem+')</span>';}).join(' ')+'</div>';
    }
    // Absences
    if(b.absences.length){
      html+='<div style="margin-top:.35rem"><strong style="font-size:.8rem;color:#991B1B">👥 Absences:</strong> '
        +b.absences.map(function(a){return'<span class="pill pill-r">'+esc(a.emp)+' on '+fmtDate(a.date)+'</span>';}).join(' ')+'</div>';
    }
    // CEO notes
    if(b.ceoNotes.length){
      html+='<div style="margin-top:.5rem"><strong style="font-size:.8rem;color:#92400E">📢 Staff Notes:</strong>';
      b.ceoNotes.forEach(function(n){html+='<div class="note-box"><strong>'+fmtDate(n.date)+'</strong> ('+esc(n.by)+'): '+esc(n.note)+'</div>';});
      html+='</div>';
    }
    html+='</div>'; // end br-block
  });

  html+='<div class="ftr">Generated by NYFD Manager &nbsp;·&nbsp; '+new Date().toLocaleString('en-PH')+'</div>'
    +'<div style="text-align:center;margin-top:.8rem"><button onclick="window.print()" style="background:#DC2626;color:#fff;border:none;border-radius:8px;padding:.5rem 1.4rem;font-size:.9rem;cursor:pointer;font-weight:700">🖨️ Print / Save PDF</button></div>'
    +'</body></html>';

  var w=window.open('','_blank');w.document.write(html);w.document.close();
}

function renderDash(){
  const panel=document.getElementById('tp-dashboard');
  const t=today();
  const sales=loadSales(t);
  const invData=loadInv(t);
  const plData=loadPL(t);
  const c=sales?computeSales(sales):{gross:0,totalCash:0,creditSales:0,netSales:0,totalSales:0,variance:0};
  const ym=t.slice(0,7);
  const tgt=loadTarget();
  const vth=loadVarThreshold();
  const atvTgt=loadATVTarget();
  const emps=loadEmps();
  const sched=loadSchedule(ym);
  const otLog=loadOT().filter(e=>e.date&&e.date.startsWith(ym));
  const rates=loadRates();

  // MTD gross
  const allSalesDates=getAllSalesDates().filter(d=>d.startsWith(ym));
  let mtdGross=0;
  allSalesDates.forEach(d=>{const rep=loadSales(d);if(rep)mtdGross+=computeSales(rep).gross;});

  // Est net profit
  const fc=loadFC();
  const dailyFC=Object.values(fc).reduce((s,v)=>s+v,0);
  let estNet=null;
  if(plData&&typeof plData.netProfit==='number'){estNet=plData.netProfit;}
  else if(sales){estNet=c.gross-dailyFC;}

  // Variance logic
  const varAmt=c.variance;
  const varOver=Math.abs(varAmt)>vth;

  // Low stock
  const invDates=getAllInvDates();
  const latestInv=invDates.length?loadInv(invDates[0]):null;
  const lowItems=getLowStockItems(latestInv);
  const storLow=typeof getStorLowItems==='function'?getStorLowItems():[];

  // 7-day trend
  const last7dates=getAllSalesDates().slice(0,7).reverse();
  const last7vals=last7dates.map(d=>{const rep=loadSales(d);return rep?computeSales(rep).gross:0;});
  const trendMax=Math.max(...last7vals,1);

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">
    <div style="font-weight:800;font-size:1rem">📊 CEO Overview — ${fmtDate(t)}</div>
    <div style="display:flex;gap:.5rem;align-items:center">
    <span id="live-ind" title="Live sync active" style="display:none;width:9px;height:9px;border-radius:50%;background:rgba(34,197,94,.5);border:2px solid #22c55e;transition:background .4s;vertical-align:middle"></span>
    <button class="btn btn-grey btn-sm" onclick="syncAndRefresh()" style="font-size:.78rem">🔄 Sync</button>
    <button class="btn btn-grey btn-sm" onclick="exportDailyReport()" style="font-size:.78rem">📄 PDF Report</button>
    <button class="btn btn-grey btn-sm" onclick="exportWeeklyReport()" style="font-size:.78rem">📊 Weekly Report</button>
    <button class="btn btn-grey btn-sm" onclick="exportDailyDigest()" style="font-size:.78rem">📋 Daily Digest</button>
    <button class="btn btn-grey btn-sm" onclick="shareViaEmail()" style="font-size:.78rem">📧 Share</button>
    <select class="branch-sel" id="dash-branch-sel" style="background:var(--grey2);color:#374151;border:1.5px solid var(--bdr)" onchange="changeBranch(this.value)"></select>
    </div>
  </div>`;

  // ── 1. Report Submissions ─────────────────────────────────────
  const chk=(icon,lbl,done)=>{
    const bg=done?'#D1FAE5':'#FEE2E2';
    const col=done?'#065F46':'#991B1B';
    return `<div style="flex:1;min-width:88px;background:${bg};border-radius:8px;padding:.55rem .65rem;text-align:center">
      <div style="font-size:1.1rem;font-weight:900;color:${col}">${done?'✓':'✗'}</div>
      <div style="font-size:.73rem;font-weight:800;color:${col};margin-top:1px">${icon} ${lbl}</div>
      <div style="font-size:.62rem;color:${col};opacity:.7;margin-top:2px">${done?'Submitted':'Not yet'}</div>
    </div>`;
  };
  h+=`<div class="card" style="padding:.75rem .85rem">
    <div style="font-size:.69rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.5rem">Today's Report Submissions</div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      ${chk('🧾','Sales',!!sales)}${chk('📦','Inventory',!!invData)}${chk('💰','P&L',!!plData)}
    </div>
  </div>`;

  // ── 2. Today KPIs ─────────────────────────────────────────────
  const tCust=sales?parseN(sales.custCount):0;
  const tAtv=tCust>0?c.netSales/tCust:null;
  const atvOk=atvTgt<=0||tAtv===null||tAtv>=atvTgt;
  const margin=c.gross>0&&estNet!==null?((estNet/c.gross)*100):null;
  h+=`<div class="sgrid">
    <div class="scard y"><div class="sl">Gross Sales</div><div class="sv">${mv('gross',fmtPHP(c.gross))}</div></div>
    <div class="scard ${estNet!==null?(estNet>=0?'g':'r'):''}"><div class="sl">Est. Net Profit</div><div class="sv ${estNet!==null?(estNet>=0?'pos':'neg'):''}">${estNet!==null?mv('netProfit',fmtPHP(estNet)):'—'}</div></div>
    <div class="scard ${sales&&varOver?(varAmt<0?'r':''):''}"><div class="sl">Cash Variance</div><div class="sv ${varAmt<0?'neg':varAmt>0?'pos':''}">${sales?mv('variance',fmtPHP(varAmt)):'—'}</div></div>
    <div class="scard"><div class="sl">Margin %</div><div class="sv">${margin!==null&&canSee('netProfit')&&canSee('gross')?margin.toFixed(1)+'%':'—'}</div></div>
    <div class="scard ${tAtv!==null?(atvOk?'g':'r'):''}"><div class="sl">Avg Transaction${atvTgt>0?' vs ₱'+atvTgt.toLocaleString():''}</div><div class="sv ${tAtv!==null?(atvOk?'pos':'neg'):''}">${tAtv!==null&&canSee('netSales')?fmtPHP(tAtv):'—'}</div></div>
  </div>`;

  // ── 3. 7-Day Sparkline ───────────────────────────────────────
  if(last7dates.length>=2){
    const _prev7dates=getAllSalesDates().slice(7,14).reverse();
    const _prev7vals=_prev7dates.map(d=>{const rep=loadSales(d);return rep?computeSales(rep).gross:0;});
    const _cur7total=last7vals.reduce((s,v)=>s+v,0);

  // ── GAP 5: Pending Approvals card (all branches) ─────────────
  var _apprSettings=loadApprovalSettings();
  if(_apprSettings.requireExpenseApproval||_apprSettings.requireRestockApproval){
    var _apprBranches=loadBranches();
    // collect pending items across every branch
    var _pendByBranch=[];
    var _pendTotal=0;
    _apprBranches.forEach(function(br){
      var _prevBr=ST.branch;ST.branch=br;
      var pExp=_apprSettings.requireExpenseApproval?loadExp(t).filter(function(e){return e.status==='pending';}):[];
      var pRk=_apprSettings.requireRestockApproval?loadRestocks(t).filter(function(e){return e.status==='pending';}):[];
      ST.branch=_prevBr;
      if(pExp.length||pRk.length){_pendByBranch.push({br:br,exps:pExp,rks:pRk});_pendTotal+=pExp.length+pRk.length;}
    });
    var _apprH='<div class="card" style="padding:.75rem .85rem;'+(_pendTotal>0?'border:2px solid #FCD34D':'')+'">'
      +'<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:'+(_pendTotal?'.55rem':'0')+'">'
      +'<div style="font-weight:800;font-size:.88rem">✅ Pending Approvals — All Branches</div>'
      +(_pendTotal>0?'<span style="background:#DC2626;color:#fff;border-radius:20px;padding:.1rem .55rem;font-size:.75rem;font-weight:900">'+_pendTotal+'</span>':'<span style="font-size:.78rem;color:#065F46;font-weight:700">All clear</span>')
      +'</div>';
    if(_pendTotal>0){
      _pendByBranch.forEach(function(grp){
        var brLabel=esc(grp.br);
        _apprH+='<div style="font-size:.72rem;font-weight:900;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;margin:.55rem 0 .3rem;padding:.2rem .5rem;background:var(--grey2);border-radius:5px">🏪 '+brLabel+'</div>';
        _apprH+='<table class="ft" style="font-size:.8rem;margin-bottom:.25rem"><thead><tr><th>Type</th><th>Description</th><th class="r">Amount</th><th>By</th><th></th></tr></thead><tbody>';
        grp.exps.forEach(function(e){
          var brSafe=grp.br.replace(/'/g,"\\'");
          _apprH+='<tr>'
            +'<td><span style="font-size:.72rem;background:#FEF3C7;color:#92400E;border-radius:10px;padding:.1rem .35rem;font-weight:800">EXPENSE</span></td>'
            +'<td style="font-weight:600">'+esc(e.name)+'</td>'
            +'<td class="r" style="font-weight:700">'+fmtPHP(e.amt)+'</td>'
            +'<td style="font-size:.75rem;color:var(--grey)">'+esc(e.submitted_by||'?')+'</td>'
            +'<td style="white-space:nowrap">'
            +'<button onclick="approveExpenseB(\''+brSafe+'\',\''+t+'\',\''+e.id+'\')" style="background:#D1FAE5;color:#065F46;border:none;border-radius:5px;padding:.18rem .45rem;cursor:pointer;font-size:.78rem;font-weight:800;margin-right:.2rem">✓ OK</button>'
            +'<button onclick="rejectExpenseB(\''+brSafe+'\',\''+t+'\',\''+e.id+'\')" style="background:#FEE2E2;color:#EF4444;border:none;border-radius:5px;padding:.18rem .45rem;cursor:pointer;font-size:.78rem;font-weight:800">✗ No</button>'
            +'</td></tr>';
        });
        grp.rks.forEach(function(e){
          var brSafe=grp.br.replace(/'/g,"\\'");
          _apprH+='<tr>'
            +'<td><span style="font-size:.72rem;background:#DBEAFE;color:#1E40AF;border-radius:10px;padding:.1rem .35rem;font-weight:800">RESTOCK</span></td>'
            +'<td style="font-weight:600">'+esc(e.item)+'<span style="font-size:.7rem;color:var(--grey);display:block">'+esc(e.supplier||'')+'</span></td>'
            +'<td class="r" style="font-weight:700">'+fmtPHP(e.totalCost)+'</td>'
            +'<td style="font-size:.75rem;color:var(--grey)">'+esc(e.submitted_by||'?')+'</td>'
            +'<td style="white-space:nowrap">'
            +'<button onclick="approveRestockB(\''+brSafe+'\',\''+t+'\',\''+e.id+'\')" style="background:#D1FAE5;color:#065F46;border:none;border-radius:5px;padding:.18rem .45rem;cursor:pointer;font-size:.78rem;font-weight:800;margin-right:.2rem">✓ OK</button>'
            +'<button onclick="rejectRestockB(\''+brSafe+'\',\''+t+'\',\''+e.id+'\')" style="background:#FEE2E2;color:#EF4444;border:none;border-radius:5px;padding:.18rem .45rem;cursor:pointer;font-size:.78rem;font-weight:800">✗ No</button>'
            +'</td></tr>';
        });
        _apprH+='</tbody></table>';
      });
    }
    _apprH+='</div>';
    h+=_apprH;
  }

  panel.innerHTML=h;
}
// ── HISTORY ───────────────────────────────────────────────────
function renderHistory(from,to){
  const panel=document.getElementById('tp-history');
  const allDates=getAllSalesDates();
  const selMonth=ST.historyMonth||today().slice(0,7);

  // ── Submission Compliance Calendar ───────────────────────────
  const calYm=selMonth;
  const calYear=parseInt(calYm.slice(0,4));
  const calMonth=parseInt(calYm.slice(5,7));
  const daysInCalMonth=new Date(calYear,calMonth,0).getDate();
  const firstDow=new Date(calYear,calMonth-1,1).getDay(); // 0=Sun
  const todayStr=today();
  let calH=`<div class="card" style="padding:.75rem .85rem">
    <div style="font-size:.69rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.5rem">📅 Submission Compliance — ${calYm}</div>
    <div style="display:flex;gap:12px;font-size:.69rem;color:var(--grey);margin-bottom:.55rem;flex-wrap:wrap">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#D1FAE5;margin-right:3px;vertical-align:middle"></span>All 3 submitted</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#FEF3C7;margin-right:3px;vertical-align:middle"></span>Partial</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#FEE2E2;margin-right:3px;vertical-align:middle"></span>Missing</span>
      <span style="font-size:.68rem">🟢 Sales &nbsp;🔵 Inv &nbsp;🟡 P&amp;L</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:.35rem">`;
  const dowLabels=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dowLabels.forEach(d=>{calH+=`<div style="text-align:center;font-size:.6rem;font-weight:800;color:var(--grey);padding:.15rem 0">${d}</div>`;});
  for(let i=0;i<firstDow;i++)calH+='<div></div>';
  for(let d=1;d<=daysInCalMonth;d++){
    const ds=calYm+'-'+(d<10?'0':'')+d;
    const isFuture=ds>todayStr;
    const hasSales=!!loadSales(ds);
    const hasInv=!!loadInv(ds);
    const hasPL=!!loadPL(ds);
    const count=(hasSales?1:0)+(hasInv?1:0)+(hasPL?1:0);
    let bg,border;
    if(isFuture){bg='#F9FAFB';border='#E5E7EB';}
    else if(count===3){bg='#D1FAE5';border='#6EE7B7';}
    else if(count>0){bg='#FEF3C7';border='#FCD34D';}
    else{bg='#FEE2E2';border='#FCA5A5';}
    const isToday=ds===todayStr;
    calH+=`<div style="background:${bg};border:1.5px solid ${isToday?'#C41E3A':border};border-radius:5px;padding:3px 2px;text-align:center${isToday?';box-shadow:0 0 0 1px #C41E3A':''};min-height:36px">
      <div style="font-size:.7rem;font-weight:${isToday?900:700};color:${isFuture?'#9CA3AF':'#374151'}">${d}</div>
      <div style="display:flex;justify-content:center;gap:1px;margin-top:2px">`;
    if(!isFuture){
      calH+=`<div style="width:5px;height:5px;border-radius:50%;background:${hasSales?'#2E7D32':'#E5E7EB'}"></div>`;
      calH+=`<div style="width:5px;height:5px;border-radius:50%;background:${hasInv?'#1D4ED8':'#E5E7EB'}"></div>`;
      calH+=`<div style="width:5px;height:5px;border-radius:50%;background:${hasPL?'#D97706':'#E5E7EB'}"></div>`;
    }
    calH+=`</div></div>`;
  }
  calH+=`</div></div>`;

  let h=calH;

  // ── Monthly Summary section
  h+=`<div class="card"><div class="ctitle">📊 Monthly P&L Summary</div>
  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;flex-wrap:wrap">
    <label style="font-size:.75rem;font-weight:800;color:var(--grey)">MONTH</label>
    <input type="month" id="hist-month" value="${selMonth}" onchange="ST.historyMonth=this.value;filterHistory()" style="padding:.38rem .65rem;border:1.5px solid var(--bdr);border-radius:7px;font-size:.88rem">
    <button class="btn btn-yel btn-sm" onclick="printMonthlyReport('${selMonth}')">🖨 Print Monthly Report</button>
  </div>`;

  const monthDates=allDates.filter(d=>d.startsWith(selMonth)).sort();
  if(!monthDates.length){
    h+=`<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:.75rem 0">No data for ${selMonth}.</p>`;
  }else{
    let mGross=0,mDisc=0,mNet=0,mVar=0,mCust=0,mDays=0,mBestDay=null,mBestNet=0;
    h+=`<div style="overflow-x:auto"><table class="htable"><thead><tr>
      <th>Date</th><th class="r">Gross</th><th class="r">Discount</th><th class="r">Net</th>
      <th class="r">Customers</th><th class="r">Avg Txn</th><th class="r">Variance</th>
    </tr></thead><tbody>`;
    monthDates.forEach(d=>{
      const rep=loadSales(d);
      const cv=rep?computeSales(rep):{gross:0,grandDisc:0,netSales:0,variance:0};
      const cust=rep?parseN(rep.custCount):0;
      const atv=cust>0?cv.netSales/cust:null;
      mGross+=cv.gross;mDisc+=cv.grandDisc;mNet+=cv.netSales;mVar+=cv.variance;mDays++;
      if(cust>0)mCust+=cust;
      if(cv.netSales>mBestNet){mBestNet=cv.netSales;mBestDay=d;}
      const hasNote=rep&&(rep.remarks||rep.varianceRemark);
      const noteIcon=hasNote?`<span title="${esc((rep.remarks||'')+(rep.varianceRemark?' | Variance: '+rep.varianceRemark:''))}" style="cursor:help;margin-left:4px;font-size:.8rem">📝</span>`:'';
      h+=`<tr>
        <td style="white-space:nowrap">${fmtDate(d)}${noteIcon}</td>
        <td class="r">${fmtPHP(cv.gross)}</td>
        <td class="r">${fmtPHP(cv.grandDisc)}</td>
        <td class="r">${fmtPHP(cv.netSales)}</td>
        <td class="r">${cust||'—'}</td>
        <td class="r">${atv!==null?fmtPHP(atv):'—'}</td>
        <td class="r ${cv.variance<0?'vneg':'vpos'}">${fmtPHP(cv.variance)}</td>
      </tr>`;
    });
    const mAtv=mCust>0?mNet/mCust:null;
    h+=`<tr style="background:var(--yel-bg)">
      <td style="font-weight:900;font-size:.88rem">TOTAL (${mDays} days)</td>
      <td class="r" style="font-weight:900">${fmtPHP(mGross)}</td>
      <td class="r" style="font-weight:900">${fmtPHP(mDisc)}</td>
      <td class="r" style="font-weight:900">${fmtPHP(mNet)}</td>
      <td class="r" style="font-weight:900">${mCust||'—'}</td>
      <td class="r" style="font-weight:900">${mAtv!==null?fmtPHP(mAtv):'—'}</td>
      <td class="r ${mVar<0?'vneg':'vpos'}" style="font-weight:900">${fmtPHP(mVar)}</td>
    </tr></tbody></table></div>`;
    const avgDaily=mDays>0?mNet/mDays:0;
    h+=`<div class="sgrid" style="margin-top:.85rem">
      <div class="scard y"><div class="sl">Total Gross</div><div class="sv">${fmtPHP(mGross)}</div></div>
      <div class="scard"><div class="sl">Total Net</div><div class="sv">${fmtPHP(mNet)}</div></div>
      <div class="scard ${mVar<0?'r':'g'}"><div class="sl">Total Variance</div><div class="sv ${mVar<0?'neg':'pos'}">${fmtPHP(mVar)}</div></div>
      <div class="scard"><div class="sl">Avg Daily Net</div><div class="sv">${fmtPHP(avgDaily)}</div></div>
      ${mBestDay?`<div class="scard g"><div class="sl">Best Day</div><div class="sv" style="font-size:.82rem;line-height:1.3">${fmtDate(mBestDay)}</div></div>`:''}
    </div>`;
  }
  h+=`</div>`;

  // ── Platform Performance section
  const platDates=allDates.filter(d=>(!from||d>=from)&&(!to||d<=to));
  const platTotals={};
  PLATFORMS.forEach(pl=>platTotals[pl]={qty:0,amt:0});
  platDates.forEach(d=>{
    const rep=loadSales(d);
    if(!rep)return;
    PLATFORMS.forEach(pl=>{
      platTotals[pl].qty+=parseN(rep.online?.[pl]?.qty);
      platTotals[pl].amt+=parseN(rep.online?.[pl]?.amt);
    });
  });
  const totalOnlineAmt=PLATFORMS.reduce((s,pl)=>s+platTotals[pl].amt,0);
  const totalOnlineQty=PLATFORMS.reduce((s,pl)=>s+platTotals[pl].qty,0);
  const rangeLabel=from||to?`${from?fmtDate(from):'Start'} – ${to?fmtDate(to):'Today'}`:`All dates (${platDates.length} days)`;
  h+=`<div class="card"><div class="ctitle">📱 Platform Performance</div>
  <p style="font-size:.75rem;color:var(--grey);margin-bottom:.75rem">Range: ${rangeLabel}</p>`;
  if(totalOnlineAmt===0){
    h+=`<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:.75rem 0">No online platform data in selected range.</p>`;
  }else{
    h+=`<div style="overflow-x:auto"><table class="htable"><thead><tr>
      <th>Platform</th><th class="r">Orders (QTY)</th><th class="r">Total (₱)</th><th class="r">% of Online</th><th class="r">Avg Order Value</th>
    </tr></thead><tbody>`;
    PLATFORMS.forEach(pl=>{
      const p=platTotals[pl];
      const pct=totalOnlineAmt>0?(p.amt/totalOnlineAmt*100).toFixed(1):'0.0';
      const avg=p.qty>0?p.amt/p.qty:0;
      h+=`<tr>
        <td style="font-weight:700">${pl}</td>
        <td class="r">${p.qty||'—'}</td>
        <td class="r">${fmtPHP(p.amt)}</td>
        <td class="r">${totalOnlineAmt>0?pct+'%':'—'}</td>
        <td class="r">${p.qty>0?fmtPHP(avg):'—'}</td>
      </tr>`;
    });
    h+=`<tr style="background:var(--yel-bg)">
      <td style="font-weight:900">TOTAL ONLINE</td>
      <td class="r" style="font-weight:900">${totalOnlineQty||'—'}</td>
      <td class="r" style="font-weight:900">${fmtPHP(totalOnlineAmt)}</td>
      <td class="r" style="font-weight:900">100%</td>
      <td class="r" style="font-weight:900">${totalOnlineQty>0?fmtPHP(totalOnlineAmt/totalOnlineQty):'—'}</td>
    </tr></tbody></table></div>`;
    h+=`<div style="margin-top:.85rem">`;
    PLATFORMS.forEach(pl=>{
      const p=platTotals[pl];
      const pct=totalOnlineAmt>0?Math.round(p.amt/totalOnlineAmt*100):0;
      if(!pct)return;
      h+=`<div style="margin-bottom:.5rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.2rem">
          <span style="font-size:.8rem;font-weight:700">${pl}</span>
          <span style="font-size:.78rem;color:var(--grey)">${pct}% · ${fmtPHP(p.amt)}</span>
        </div>
        <div style="background:var(--grey2);border-radius:20px;height:7px;overflow:hidden">
          <div style="background:var(--red);width:${pct}%;height:100%;border-radius:20px"></div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  // ── All Reports section
  let dates=allDates;
  if(from)dates=dates.filter(d=>d>=from);
  if(to)dates=dates.filter(d=>d<=to);

  // Flag filter
  const _hf=ST.histFilter||'all';
  const _vth=loadVarThreshold();
  // Pre-compute per-date flags for filter chips counts
  const _allFlagged={};
  dates.forEach(function(d){
    var s=loadSales(d),inv=loadInv(d),pl=loadPL(d);
    var cv=s?computeSales(s):{variance:0,gross:0};
    _allFlagged[d]={noSales:!s,noInv:!inv,noPL:!pl,highVar:Math.abs(cv.variance)>_vth,incomplete:!s||!inv||!pl,gross:cv.gross};
  });
  const _grossVals=dates.map(d=>_allFlagged[d].gross).filter(g=>g>0).sort((a,b)=>b-a);
  const _top25Thresh=_grossVals.length?_grossVals[Math.max(0,Math.ceil(_grossVals.length*0.25)-1)]:Infinity;
  const _counts={
    all:dates.length,
    'high-var':dates.filter(d=>_allFlagged[d].highVar).length,
    incomplete:dates.filter(d=>_allFlagged[d].incomplete).length,
    'no-sales':dates.filter(d=>_allFlagged[d].noSales).length,
    'no-inv':dates.filter(d=>_allFlagged[d].noInv).length,
    'no-pl':dates.filter(d=>_allFlagged[d].noPL).length,
    'best-days':dates.filter(d=>_allFlagged[d].gross>=_top25Thresh&&_allFlagged[d].gross>0).length,
  };
  if(_hf==='high-var')dates=dates.filter(d=>_allFlagged[d].highVar);
  else if(_hf==='incomplete')dates=dates.filter(d=>_allFlagged[d].incomplete);
  else if(_hf==='no-sales')dates=dates.filter(d=>_allFlagged[d].noSales);
  else if(_hf==='no-inv')dates=dates.filter(d=>_allFlagged[d].noInv);
  else if(_hf==='no-pl')dates=dates.filter(d=>_allFlagged[d].noPL);
  else if(_hf==='best-days')dates=dates.filter(d=>_allFlagged[d].gross>=_top25Thresh&&_allFlagged[d].gross>0);

  const _filterChips=[
    {v:'all',l:'All',icon:'📋'},
    {v:'high-var',l:'High Variance',icon:'⚠️'},
    {v:'incomplete',l:'Incomplete Days',icon:'❌'},
    {v:'no-sales',l:'No Sales',icon:'🧾'},
    {v:'no-inv',l:'No Inventory',icon:'📦'},
    {v:'no-pl',l:'No P&L',icon:'💰'},
    {v:'best-days',l:'Best Days',icon:'🏆'},
  ];

  h+=`<div class="fbar">
    <label>From:</label>
    <input type="date" id="hf-from" value="${from||''}" onchange="filterHistory()">
    <label>To:</label>
    <input type="date" id="hf-to" value="${to||''}" onchange="filterHistory()">
    <button class="btn btn-grey btn-sm" onclick="document.getElementById('hf-from').value='';document.getElementById('hf-to').value='';filterHistory()">Clear</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.65rem">`;
  _filterChips.forEach(function(chip){
    var active=_hf===chip.v;
    var cnt=_counts[chip.v]||0;
    var isAlert=chip.v==='high-var'||chip.v==='incomplete'||chip.v==='no-sales'||chip.v==='no-inv'||chip.v==='no-pl';
    var activeBg=chip.v==='best-days'?'#065F46':isAlert?'#991B1B':'var(--red)';
    h+=`<button onclick="setHistFilter('${chip.v}')" style="font-size:.75rem;padding:.25rem .65rem;border-radius:14px;border:1.5px solid ${active?activeBg:'var(--bdr)'};background:${active?activeBg:'#fff'};color:${active?'#fff':'#374151'};font-weight:700;cursor:pointer">${chip.icon} ${chip.l}${cnt!==_counts.all?' ('+cnt+')':''}</button>`;
  });
  h+=`</div>
  <div class="card">
    <div class="ctitle">📋 ${_hf==='all'?'All Daily Sales Reports':'Filtered: '+_filterChips.find(c=>c.v===_hf).icon+' '+_filterChips.find(c=>c.v===_hf).l} — ${dates.length} record${dates.length!==1?'s':''}</div>`;

  if(!dates.length){
    h+=`<p style="color:var(--grey);font-size:.875rem;text-align:center;padding:1rem">No reports found.</p>`;
  } else {
    h+=`<div style="overflow-x:auto"><table class="htable"><thead><tr>
      <th>Date</th><th>Flags</th><th class="r">Gross</th><th class="r">Discount</th><th class="r">Net</th>
      <th class="r">Cash</th><th class="r">Online</th><th class="r">Total</th>
      <th class="r">Variance</th><th class="r">Customers</th><th class="r">Avg Txn</th><th>Actions</th>
    </tr></thead><tbody>`;
    dates.forEach(d=>{
      const rep=loadSales(d);
      const cv=rep?computeSales(rep):{gross:0,grandDisc:0,netSales:0,totalCash:0,creditSales:0,totalSales:0,variance:0};
      const hCust=rep?parseN(rep.custCount):0;
      const hAtv=hCust>0?cv.netSales/hCust:null;
      const _fl=_allFlagged[d]||{};
      const _varOver=Math.abs(cv.variance)>_vth;
      const _isBest=_fl.gross>=_top25Thresh&&_fl.gross>0;
      let _flags='';
      if(_fl.noSales)_flags+='<span title="No sales report" style="font-size:.68rem;background:#FEE2E2;color:#991B1B;border-radius:4px;padding:.05rem .3rem;font-weight:800;margin-right:2px">S</span>';
      if(_fl.noInv)_flags+='<span title="No inventory report" style="font-size:.68rem;background:#FEE2E2;color:#991B1B;border-radius:4px;padding:.05rem .3rem;font-weight:800;margin-right:2px">I</span>';
      if(_fl.noPL)_flags+='<span title="No P&L report" style="font-size:.68rem;background:#FEE2E2;color:#991B1B;border-radius:4px;padding:.05rem .3rem;font-weight:800;margin-right:2px">P</span>';
      if(_varOver)_flags+='<span title="High variance" style="font-size:.68rem;background:#FEF3C7;color:#92400E;border-radius:4px;padding:.05rem .3rem;font-weight:800;margin-right:2px">⚠</span>';
      if(_isBest)_flags+='<span title="Top 25% day" style="font-size:.68rem;background:#D1FAE5;color:#065F46;border-radius:4px;padding:.05rem .3rem;font-weight:800">🏆</span>';
      const _rowBg=_fl.incomplete?'background:#FFF5F5':_isBest?'background:#F0FFF4':'';
      h+=`<tr style="${_rowBg}">
        <td style="white-space:nowrap">${fmtDate(d)}</td>
        <td style="white-space:nowrap">${_flags||'<span style="color:var(--grey);font-size:.75rem">✓</span>'}</td>
        <td class="r">${fmtPHP(cv.gross)}</td>
        <td class="r">${fmtPHP(cv.grandDisc)}</td>
